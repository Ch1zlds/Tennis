<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stay Hard">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-512.png">
<meta name="theme-color" content="#000000">
<title>Stay Hard — Strength Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink:#000000;
  --ink-2:#0d0d0d;
  --ink-3:#1a1a1a;
  --court:#c81e0f;
  --chalk:#ffffff;
  --chalk-dim:#8f8f8f;
  --lime:#ff2d12;
  --clay:#b8291a;
  --line:rgba(255,255,255,0.13);
  --bg:var(--ink);
  --bg-card:var(--ink-2);
  --bg-card-2:var(--ink-3);
  --text:var(--chalk);
  --text-dim:var(--chalk-dim);
  --accent:var(--lime);
  --danger:#ff4d3d;
  --radius:10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans', -apple-system, sans-serif;
  min-height:100vh;
  overscroll-behavior-y:none;
}
h1,h2,h3,.display{
  font-family:'Oswald', sans-serif;
  text-transform:uppercase;
  letter-spacing:0.02em;
  margin:0;
}
.mono{font-family:'IBM Plex Mono', monospace;}
#app{max-width:520px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:calc(78px + var(--safe-bottom)); overflow-x:hidden;}

/* header */
.topbar{
  position:sticky; top:0; z-index:20;
  background:var(--bg);
  padding:calc(14px + var(--safe-top)) 18px 12px;
  border-bottom:2px solid var(--text);
  display:flex; align-items:center; justify-content:space-between;
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:34px;height:34px;border-radius:6px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:'Oswald'; font-weight:700; color:#000; font-size:18px;
  flex-shrink:0;
}
.brand-sub{font-size:12px; color:var(--text-dim); letter-spacing:0.14em; text-transform:uppercase; font-weight:600;}
.icon-btn{
  width:38px;height:38px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg-card); color:var(--text); display:flex;align-items:center;justify-content:center;
  font-size:16px; cursor:pointer;
  transition:transform .1s ease, filter .1s ease;
}
.icon-btn:active{transform:scale(0.93); filter:brightness(0.85);}

/* content */
.content{padding:16px 16px 20px;}
@keyframes slideInFromRight{from{transform:translateX(28px); opacity:0;} to{transform:translateX(0); opacity:1;}}
@keyframes slideInFromLeft{from{transform:translateX(-28px); opacity:0;} to{transform:translateX(0); opacity:1;}}
@keyframes overlayFade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
.content.anim-forward{animation:slideInFromRight .22s ease;}
.content.anim-backward{animation:slideInFromLeft .22s ease;}
.content.overlay-anim{animation:overlayFade .2s ease;}
.card{
  background:var(--bg-card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 6px 18px rgba(0,0,0,0.35);
}
.card-title{font-size:12px; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px; font-weight:700; display:flex; align-items:center; gap:7px;}
.card-title::before{content:''; width:7px; height:7px; background:var(--accent); flex-shrink:0; transform:rotate(45deg);}

/* quote */
.quote-card{
  background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 16px),
    #000;
  border:1px solid var(--line); position:relative; overflow:hidden; padding:18px 16px;
}
.quote-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent);}
.quote-text{font-family:'Oswald'; font-size:17px; color:#fff; text-transform:uppercase; letter-spacing:0.01em; line-height:1.35; padding-left:10px; font-weight:600;}
.quote-attr{font-size:10px; color:#8f8f8f; letter-spacing:0.14em; margin-top:10px; padding-left:10px; font-weight:600;}

/* stat grid */
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;}
.stat-box{
  background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px 14px 12px;
}
.stat-num{font-family:'IBM Plex Mono'; font-weight:600; font-size:28px; line-height:1; color:var(--accent);}
.stat-label{font-size:11px; color:var(--text-dim); margin-top:6px; letter-spacing:0.05em; text-transform:uppercase; font-weight:600;}
.streak-hero{
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 2px, transparent 2px, transparent 14px),
    linear-gradient(135deg, var(--court) 0%, var(--ink) 90%);
  border-radius:var(--radius); padding:20px; margin-bottom:12px; position:relative; overflow:hidden;
  border:1px solid var(--line);
}
.streak-hero::after{
  content:'';position:absolute; right:-30px; top:-30px; width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,45,18,0.25), transparent 70%);
}
.streak-num{font-family:'IBM Plex Mono'; font-weight:600; font-size:46px; color:#fff; line-height:1; text-shadow:0 2px 10px rgba(0,0,0,0.45);}
.streak-label{color:#fff; opacity:0.85; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; font-weight:600;}

/* buttons */
.btn{
  border:none; border-radius:8px; padding:13px 16px; font-family:'IBM Plex Sans'; font-weight:700;
  font-size:13px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:6px;
  letter-spacing:0.04em; text-transform:uppercase;
  transition:transform .1s ease, filter .1s ease, opacity .1s ease;
}
.btn:active{transform:scale(0.97); filter:brightness(0.88);}
.btn-primary{background:var(--accent); color:#fff;}
.btn-secondary{background:var(--bg-card-2); color:var(--text); border:1px solid var(--line);}
.btn-danger{background:transparent; color:var(--danger); border:1px solid rgba(255,77,61,0.4);}
.btn-block{width:100%;}
.btn-sm{padding:8px 12px; font-size:11px; border-radius:7px;}
.pill-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; margin-bottom:14px;}
.pill{
  flex-shrink:0; padding:9px 16px; border-radius:7px; font-size:12.5px; font-weight:700;
  background:var(--bg-card); border:1px solid var(--line); color:var(--text-dim); cursor:pointer;
  font-family:'IBM Plex Sans'; text-transform:uppercase; letter-spacing:0.03em;
  transition:transform .1s ease, background .15s ease, color .15s ease, border-color .15s ease;
}
.pill:active{transform:scale(0.95);}
.pill.active{background:var(--accent); color:#fff; border-color:var(--accent);}

/* exercise card */
.ex-card{background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:10px;}
.superset-wrap{border:1.5px dashed var(--accent); border-radius:var(--radius); padding:10px; margin-bottom:10px;}
.superset-wrap .ex-card{margin-bottom:8px;}
.superset-wrap .ex-card:last-child{margin-bottom:0;}
.superset-label{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--accent); margin:2px 0 8px 4px;}
.muscle-map{display:block; width:100%; max-width:220px; height:auto; margin:0 auto 16px;}
.muscle-bar-track{background:var(--bg-card-2); border-radius:999px; height:7px; overflow:hidden;}
.muscle-bar-fill{height:100%; background:var(--accent); border-radius:999px; transition:width .3s ease;}
.ex-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;}
.ex-name{font-size:15px; font-weight:700;}
.ex-prev{font-size:11px; color:var(--text-dim); margin-top:3px;}
.pr-badge{
  background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:3px 8px;
  border-radius:5px; letter-spacing:0.05em; white-space:nowrap; text-transform:uppercase;
}
.side-label{font-size:11px; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin:10px 0 4px;}
.swatch-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;}
.swatch{
  width:38px; height:38px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  display:flex; align-items:center; justify-content:center; transition:transform .12s ease, border-color .12s ease;
}
.swatch:active{transform:scale(0.9);}
.swatch.active{border-color:#fff;}
.swatch-check{color:#fff; font-size:14px; font-weight:700; opacity:0;}
.swatch.active .swatch-check{opacity:1;}
.set-row{display:grid; grid-template-columns:28px 1fr 1fr; gap:8px; align-items:center; margin-bottom:6px;}
.set-idx{font-family:'IBM Plex Mono'; font-size:12px; color:var(--text-dim); text-align:center;}
.set-input{
  width:100%; background:var(--bg-card-2); border:1px solid var(--line); border-radius:7px;
  padding:9px 10px; color:var(--text); font-family:'IBM Plex Mono'; font-size:14px;
}
.set-input:focus{outline:2px solid var(--accent); outline-offset:-1px;}
.set-input-label{font-size:9px; color:var(--text-dim); text-align:center; margin-bottom:2px; letter-spacing:0.08em; text-transform:uppercase;}

textarea.notes{
  width:100%; min-height:70px; background:var(--bg-card-2); border:1px solid var(--line); border-radius:8px;
  padding:10px; color:var(--text); font-family:'IBM Plex Sans'; font-size:13px; resize:vertical;
}
input.text-input, select.text-input{
  width:100%; background:var(--bg-card-2); border:1px solid var(--line); border-radius:8px;
  padding:11px 12px; color:var(--text); font-family:'IBM Plex Sans'; font-size:14px;
}
label.field-label{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; display:block; margin:10px 0 5px; font-weight:600;}

/* bottom nav */
.tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  max-width:520px; margin:0 auto;
  background:var(--bg-card); border-top:2px solid var(--text);
  display:flex; padding:8px 4px calc(8px + var(--safe-bottom));
}
.tab-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px;
  color:var(--text-dim); background:none; border:none; font-family:'IBM Plex Sans'; cursor:pointer;
  position:relative; transition:color .15s ease;
}
.tab-item.active{color:var(--accent);}
.tab-item.active::before{
  content:''; position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  width:16px; height:3px; border-radius:0 0 3px 3px; background:var(--accent);
}
.tab-icon{font-size:19px; line-height:1;}
.tab-label{font-size:9.5px; letter-spacing:0.04em; text-transform:uppercase; font-weight:700;}

/* calendar */
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
.cal-dow{font-size:9px; text-align:center; color:var(--text-dim); text-transform:uppercase; padding-bottom:4px; letter-spacing:0.05em; font-weight:700;}
.cal-day{
  aspect-ratio:1; border-radius:7px; background:var(--bg-card-2); display:flex; flex-direction:column;
  align-items:center; justify-content:center; font-size:12px; position:relative; cursor:pointer; border:1px solid transparent;
}
.cal-day.empty{background:transparent;}
.cal-day.today{border-color:var(--accent);}
.cal-day.done{background:var(--accent); color:#fff;}
.cal-day.done .cal-check{position:absolute; bottom:3px; font-size:8px;}
.cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.cal-month-label{font-size:16px; font-weight:700; font-family:'Oswald'; text-transform:uppercase;}
.day-detail{margin-top:12px; padding:12px; background:var(--bg-card-2); border-radius:8px; font-size:13px;}

/* toast */
#toast{
  position:fixed; bottom:calc(90px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px);
  background:#000; color:#fff; border:1px solid var(--line); padding:12px 18px; border-radius:8px;
  font-size:13px; z-index:100; opacity:0; pointer-events:none; transition:all .25s ease; max-width:88%; text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
.toast-undo{color:var(--accent); font-weight:700; margin-left:8px; text-transform:uppercase; cursor:pointer; text-decoration:underline;}

/* timer FAB */
.fab{
  position:fixed; right:16px; bottom:calc(94px + var(--safe-bottom)); z-index:40;
  width:52px; height:52px; border-radius:10px; background:var(--bg-card); color:var(--text); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
}
.fab.running{background:var(--accent); color:#fff; border-color:var(--accent);}
.timer-panel{
  position:fixed; right:16px; bottom:calc(154px + var(--safe-bottom)); z-index:40;
  background:var(--bg-card); border:1px solid var(--line); border-radius:10px; padding:14px; width:200px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6); display:none;
}
.timer-panel.open{display:block;}
.timer-display{font-family:'IBM Plex Mono'; font-size:32px; text-align:center; margin-bottom:10px; font-weight:600;}
.timer-presets{display:flex; gap:6px; margin-bottom:10px;}
.timer-presets .pill{padding:6px 0; flex:1; text-align:center; font-size:11px;}
.timer-controls{display:flex; gap:6px;}
.timer-controls .btn{flex:1; padding:9px 4px; font-size:11px;}

/* search */
.search-wrap{position:relative; margin-bottom:14px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:14px;}

.list-row{display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid var(--line);}
.list-row:last-child{border-bottom:none;}
.list-row-title{font-size:14px; font-weight:600;}
.list-row-sub{font-size:11px; color:var(--text-dim); margin-top:2px;}
.list-row-val{font-family:'IBM Plex Mono'; font-weight:600; color:var(--accent); font-size:15px;}
.gain-pos{color:var(--accent);}
.gain-neg{color:#8f8f8f;}

.sparkline{display:block; margin-top:8px;}

.switch{position:relative; width:46px; height:26px; flex-shrink:0;}
.switch input{opacity:0; width:0; height:0;}
.slider{position:absolute; inset:0; background:var(--bg-card-2); border:1px solid var(--line); border-radius:999px; cursor:pointer; transition:.2s;}
.slider::before{content:''; position:absolute; width:20px; height:20px; left:2px; top:2px; background:var(--chalk-dim); border-radius:50%; transition:.2s;}
.switch input:checked + .slider{background:var(--accent);}
.switch input:checked + .slider::before{transform:translateX(20px); background:#fff;}

.empty-state{text-align:center; padding:30px 10px; color:var(--text-dim); font-size:13px;}
.file-hidden{display:none;}
.tag{font-size:10px; padding:3px 8px; border-radius:5px; background:var(--bg-card-2); color:var(--text-dim); border:1px solid var(--line); text-transform:uppercase; font-weight:600;}
.heat-grid{display:grid; grid-auto-flow:column; grid-template-rows:repeat(7,1fr); gap:3px; overflow-x:auto; padding-bottom:4px;}
.heat-cell{width:10px; height:10px; border-radius:2px; background:var(--bg-card-2);}
.heat-cell.active{background:var(--accent);}
.editor-row-btn{width:32px; height:32px; font-size:12px; flex-shrink:0;}
.uni-check-label{display:flex; align-items:center; gap:3px; font-size:9px; color:var(--text-dim); flex-shrink:0; text-transform:uppercase; font-weight:700;}
.uni-check-label input{width:14px; height:14px;}
.meso-table-wrap{overflow-x:auto; margin:0 -4px;}
.meso-table{border-collapse:collapse; width:100%; font-size:12px;}
.meso-table th, .meso-table td{padding:5px 6px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap;}
.meso-table th{color:var(--text-dim); text-transform:uppercase; font-size:9px; letter-spacing:.05em; font-weight:700;}
.meso-table td:first-child{position:sticky; left:0; background:var(--bg-card); min-width:140px; white-space:normal; font-size:11.5px;}
.meso-table input{width:52px; padding:6px 4px; font-size:12px;}
::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="4" width="4" height="16" rx="1.4" fill="#0a0a0a"/>
          <rect x="19" y="4" width="4" height="16" rx="1.4" fill="#0a0a0a"/>
          <rect x="5" y="10.2" width="14" height="3.6" rx="1" fill="#0a0a0a"/>
        </svg>
      </div>
      <div class="brand-sub" id="headerDate"></div>
    </div>
    <button class="icon-btn" onclick="openSearch()" aria-label="Search exercises">🔍</button>
  </div>
  <div class="content" id="content"></div>
</div>

<button class="fab" id="fab" onclick="toggleTimer()">⏱</button>
<div class="timer-panel" id="timerPanel">
  <div class="timer-display mono" id="timerDisplay">01:00</div>
  <div class="timer-presets">
    <div class="pill" onclick="setTimerPreset(30)">30s</div>
    <div class="pill" onclick="setTimerPreset(60)">60s</div>
    <div class="pill" onclick="setTimerPreset(90)">90s</div>
  </div>
  <div class="timer-controls">
    <button class="btn btn-primary" id="timerStartBtn" onclick="timerToggle()">Start</button>
    <button class="btn btn-secondary" onclick="timerReset()">Reset</button>
  </div>
</div>

<div class="tabbar" id="tabbar">
  <button class="tab-item" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="tab-icon">🏠</span><span class="tab-label">Home</span></button>
  <button class="tab-item" data-tab="workout" onclick="switchTab('workout')"><span class="tab-icon">🏋️</span><span class="tab-label">Workout</span></button>
  <button class="tab-item" data-tab="progress" onclick="switchTab('progress')"><span class="tab-icon">📈</span><span class="tab-label">Progress</span></button>
  <button class="tab-item" data-tab="calendar" onclick="switchTab('calendar')"><span class="tab-icon">📅</span><span class="tab-label">Calendar</span></button>
  <button class="tab-item" data-tab="more" onclick="switchTab('more')"><span class="tab-icon">⚙️</span><span class="tab-label">More</span></button>
</div>

<div id="toast"></div>
<input type="file" id="importFile" class="file-hidden" accept="application/json">

<script>
/* ---------------------------------------------------------------
   STAY HARD — Tennis Dumbbell Strength Tracker
   Vanilla JS, single file, persisted via window.storage (per-user)
   or localStorage when hosted standalone.
--------------------------------------------------------------- */

const STORAGE_KEY = 'stayhard-tennis-tracker-data-v2';
const TAB_ORDER = ['dashboard','workout','progress','calendar','more'];
const APP_VERSION = '1.9.0';

const ACCENT_THEMES = {
  red:    { label:'Red',    swatch:'#ff2d12', lime:'#ff2d12', court:'#c81e0f' },
  orange: { label:'Orange', swatch:'#ff8a1e', lime:'#ff8a1e', court:'#c2600e' },
  yellow: { label:'Yellow', swatch:'#ffcc1e', lime:'#ffcc1e', court:'#b8930e' },
  green:  { label:'Green',  swatch:'#3ecf5b', lime:'#3ecf5b', court:'#1f8f3a' },
  blue:   { label:'Blue',   swatch:'#2e8bff', lime:'#2e8bff', court:'#1c4fb0' },
  purple: { label:'Purple', swatch:'#b25cff', lime:'#b25cff', court:'#7a2fd6' },
  pink:   { label:'Pink',   swatch:'#ff4fa3', lime:'#ff4fa3', court:'#c92877' },
};
function applyAccentTheme(){
  const key = (state.data && state.data.settings.accentColor) || 'red';
  const t = ACCENT_THEMES[key] || ACCENT_THEMES.red;
  document.documentElement.style.setProperty('--lime', t.lime);
  document.documentElement.style.setProperty('--court', t.court);
}
function setAccentTheme(key){
  state.data.settings.accentColor = key;
  saveData();
  applyAccentTheme();
  render();
}

const GOGGINS_QUOTES = [
  "Stay hard.",
  "Don't stop when you're tired. Stop when you're done.",
  "Suffering is the true test of life.",
  "Nobody cares. Work harder.",
  "Discipline is the only way you consistently master yourself.",
  "You have to build calluses on your brain.",
  "Motivation is crap. Motivation comes and goes.",
  "The most important conversations are the ones you have with yourself.",
  "You are stronger than you think.",
  "Take the uncomfortable path.",
  "Callous your mind through pain and suffering.",
  "The only way out is through.",
  "Under great pain is where you find your true self.",
  "Most people quit when they want to. Winners quit when they've had enough.",
  "Every morning you have two choices: keep sleeping or get up and chase your dreams.",
  "Don't feel entitled to anything you didn't sweat for.",
  "When you think you're done, you're only forty percent in.",

const hasClaudeStorage = (typeof window!=='undefined' && !!window.storage);

async function loadData(){
  try{
    let raw = null;
    if(hasClaudeStorage){
      const res = await window.storage.get(STORAGE_KEY, false);
      raw = res ? res.value : null;
    } else {
      raw = localStorage.getItem(STORAGE_KEY);
    }
    if(raw){
      const d = defaultData();
      const parsed = JSON.parse(raw);
      state.data = {
        ...d, ...parsed,
        program: parsed.program || d.program,
        exercises: parsed.exercises || d.exercises,
        vacations: parsed.vacations || [],
        savedPrograms: parsed.savedPrograms || [],
        mesocycle: parsed.mesocycle || null,
        programRotation: parsed.programRotation || null,
        settings: {...d.settings, ...(parsed.settings||{})}
      };
    } else {
      state.data = defaultData();
    }
  }catch(e){
    state.data = defaultData();
  }
  state.loaded = true;
}
async function saveData(){
  try{
    const json = JSON.stringify(state.data);
    if(hasClaudeStorage){
      await window.storage.set(STORAGE_KEY, json, false);
    } else {
      localStorage.setItem(STORAGE_KEY, json);
    }
  }catch(e){
    showToast('⚠️ Could not save — storage may be full');
  }
}

/* ---------------- computed stats ---------------- */
function exerciseHistory(exId){
  const rows = [];
  for(const w of state.data.workouts){
    const ex = w.exercises && w.exercises[exId];
    if(!ex) continue;
    const allSets = ex.unilateral ? [...(ex.leftSets||[]), ...(ex.rightSets||[])] : (ex.sets||[]);
    if(!allSets.length) continue;
    let maxW = 0, repsAtMax = 0, volume = 0;
    for(const s of allSets){
      const wt = Number(s.weight)||0, r = Number(s.reps)||0;
      volume += wt*r;
      if(wt>0 && wt >= maxW){ maxW = wt; repsAtMax = r; }
    }
    if(maxW>0) rows.push({date:w.date, maxWeight:maxW, reps:repsAtMax, day:w.day, volume});
  }
  rows.sort((a,b)=> a.date.localeCompare(b.date));
  return rows;
}
function personalBest(exId){
  const h = exerciseHistory(exId);
  if(!h.length) return null;
  return h.reduce((best,cur)=> cur.maxWeight>best.maxWeight ? cur : best, h[0]);
}
function strengthGainPct(exId){
  const h = exerciseHistory(exId);
  if(h.length<2) return null;
  const first = h[0].maxWeight, last = h[h.length-1].maxWeight;
  if(first<=0) return null;
  return ((last-first)/first)*100;
}
function previousWeightFor(exId){
  const h = exerciseHistory(exId);
  if(!h.length) return null;
  return h[h.length-1];
}
function fourWeeksAgoEntry(exId){
  const target = new Date(Date.now() - 28*86400000);
  const h = exerciseHistory(exId);
  let best=null, bestDiff=Infinity;
  for(const r of h){
    const diff = Math.abs(new Date(r.date+'T00:00:00') - target);
    if(diff < bestDiff){ bestDiff = diff; best = r; }
  }
  if(best && bestDiff <= 5*86400000) return best;
  return null;
}
function roundToPlate(weight){
  const inc = state.data.settings.plateIncrement || 2.5;
  return Math.round(weight/inc) * inc;
}
function suggestedWeight(exId){
  const prev = previousWeightFor(exId);
  if(!prev || prev.maxWeight<=0) return null;
  const inc = state.data.settings.plateIncrement || 2.5;
  return roundToPlate(prev.maxWeight + inc);
}
function workoutDatesSet(){
  return new Set(state.data.workouts.map(w=>w.date));
}
function getActiveVacation(){
  return (state.data.vacations||[]).find(v=>!v.end);
}
function isVacationDay(dateStr){
  return (state.data.vacations||[]).some(v => dateStr >= v.start && dateStr <= (v.end || todayStr()));
}
function calendarGapDays(dateA, dateB){
  const a = new Date(dateA+'T00:00:00'), b = new Date(dateB+'T00:00:00');
  return Math.round((b-a)/86400000) - 1;
}
function vacationDaysBetween(dateA, dateB){
  let count = 0;
  const cursor = new Date(dateA+'T00:00:00');
  cursor.setDate(cursor.getDate()+1);
  const end = new Date(dateB+'T00:00:00');
  while(cursor < end){
    if(isVacationDay(dateToStr(cursor))) count++;
    cursor.setDate(cursor.getDate()+1);
  }
  return count;
}
function effectiveGap(dateA, dateB){
  const raw = calendarGapDays(dateA, dateB);
  const vac = vacationDaysBetween(dateA, dateB);
  return Math.max(0, raw - vac);
}
function computeStreak(){
  const tol = (state.data.settings.streakGapTolerance!=null) ? state.data.settings.streakGapTolerance : 2;
  const dates = Array.from(workoutDatesSet()).sort().reverse();
  if(!dates.length) return 0;
  const today = todayStr();
  const onVacationNow = isVacationDay(today);
  const gapToToday = effectiveGap(dates[0], today);
  if(!onVacationNow && gapToToday > tol) return 0;
  let streak = 1;
  for(let i=1;i<dates.length;i++){
    const gap = effectiveGap(dates[i], dates[i-1]);
    if(gap <= tol) streak++;
    else break;
  }
  return streak;
}
function monthlyTotals(year, month){
  const wos = state.data.workouts.filter(w=>{
    const d = new Date(w.date+'T00:00:00');
    return d.getFullYear()===year && d.getMonth()===month;
  });
  let volume = 0;
  for(const w of wos){
    for(const exId in w.exercises){
      const ex = w.exercises[exId];
      const allSets = ex.unilateral ? [...(ex.leftSets||[]), ...(ex.rightSets||[])] : (ex.sets||[]);
      for(const s of allSets){
        volume += (Number(s.weight)||0) * (Number(s.reps)||0);
      }
    }
  }
  return { count: wos.length, volume };
}
function prsThisMonth(){
  const now = new Date();
  let n = 0;
  for(const w of state.data.workouts){
    const d = new Date(w.date+'T00:00:00');
    if(d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth()){
      n += (w.prExIds||[]).length;
    }
  }
  return n;
}
function nextWorkoutDay(){
  const sorted = [...state.data.workouts].sort((a,b)=> b.date.localeCompare(a.date) || b.day-a.day);
  if(!sorted.length) return 1;
  const last = sorted[0].day;
  return last>=4 ? 1 : last+1;
}
function currentMesoWeek(){
  const m = state.data.mesocycle;
  if(!m) return null;
  const start = new Date(m.startDate+'T00:00:00');
  const today = new Date(todayStr()+'T00:00:00');
  const diffDays = Math.floor((today-start)/86400000);
  if(diffDays<0) return null;
  const week = Math.floor(diffDays/7)+1;
  if(week > m.weeks) return null;
  return week;
}
function mesoTargetFor(exId){
  const m = state.data.mesocycle;
  const wk = currentMesoWeek();
  if(!m || !wk || !m.targets[exId]) return null;
  const val = m.targets[exId][wk-1];
  return val>0 ? roundToPlate(val) : null;
}

/* ---------------- Program Rotation ---------------- */
function currentRotationProgramId(){
  const r = state.data.programRotation;
  if(!r || !r.enabled || !r.programIds || r.programIds.length<2 || !r.startDate) return null;
  const start = new Date(r.startDate+'T00:00:00');
  const today = new Date(todayStr()+'T00:00:00');
  const diffDays = Math.floor((today-start)/86400000);
  if(diffDays<0) return r.programIds[0];
  const weeksElapsed = Math.floor(diffDays/7);
  const cycleIndex = Math.floor(weeksElapsed/r.intervalWeeks) % r.programIds.length;
  return r.programIds[cycleIndex];
}
function nextRotationDate(){
  const r = state.data.programRotation;
  if(!r || !r.enabled) return null;
  const start = new Date(r.startDate+'T00:00:00');
  const today = new Date(todayStr()+'T00:00:00');
  const diffDays = Math.floor((today-start)/86400000);
  const weeksElapsed = Math.floor(diffDays/7);
  const cycleWeek = Math.floor(weeksElapsed/r.intervalWeeks);
  const nextBoundaryDays = (cycleWeek+1) * r.intervalWeeks * 7;
  return dateToStr(new Date(start.getTime() + nextBoundaryDays*86400000));
}
function checkProgramRotation(){
  const r = state.data.programRotation;
  if(!r || !r.enabled) return;
  const targetId = currentRotationProgramId();
  if(!targetId || targetId === r.lastAppliedProgramId) return;
  const sp = (state.data.savedPrograms||[]).find(p=>p.id===targetId);
  if(!sp) return;
  state.data.program = JSON.parse(JSON.stringify(sp.program));
  state.data.exercises = {...state.data.exercises, ...JSON.parse(JSON.stringify(sp.exercises))};
  r.lastAppliedProgramId = targetId;
  saveData();
  showToast(`🔁 Rotated to "${sp.name}" for this block`);
}

  const dir = toIdx>fromIdx ? 'forward' : (toIdx<fromIdx ? 'backward' : null);
  clearAllStretchTimers();
  state.tab = tab;
  state.searchOpen = false;
  state.editorOpen = false;
  state.mesoEditorOpen = false;
  state.summaryOpen = false;
  state.cooldownOpen = false;
  render(dir);

function render(animDir){
  document.querySelectorAll('.tab-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.tab===state.tab);
  });
  const c = document.getElementById('content');
  const isOverlay = state.searchOpen || state.editorOpen || state.mesoEditorOpen || state.summaryOpen || state.cooldownOpen;
  if(state.searchOpen){ c.innerHTML = renderSearch(); }
  else if(state.editorOpen){ c.innerHTML = renderEditor(); }
  else if(state.mesoEditorOpen){ c.innerHTML = renderMesoEditor(); }
  else if(state.summaryOpen){ c.innerHTML = renderSummary(); }
  else if(state.cooldownOpen){ c.innerHTML = renderCooldown(); }
  else {
    switch(state.tab){
      case 'dashboard': c.innerHTML = renderDashboard(); break;
      case 'workout': c.innerHTML = renderWorkout(); break;
      case 'progress': c.innerHTML = renderProgress(); break;
      case 'calendar': c.innerHTML = renderCalendar(); break;
      case 'more': c.innerHTML = renderMore(); break;
    }
  }
  if(animDir || isOverlay){
    c.classList.remove('anim-forward','anim-backward','overlay-anim');
    void c.offsetWidth;
    if(isOverlay){
      c.classList.add('overlay-anim');
    } else {
      c.classList.add(animDir==='forward' ? 'anim-forward' : 'anim-backward');
    }
  }
}

function last7DaysStats(){
  const cutoff = dateToStr(new Date(Date.now()-6*86400000));
  const wos = state.data.workouts.filter(w=>w.date>=cutoff);
  let volume=0, prCount=0;
  for(const w of wos){
    prCount += (w.prExIds||[]).length;
    for(const exId in w.exercises){
      const ex = w.exercises[exId];
      const allSets = ex.unilateral ? [...(ex.leftSets||[]), ...(ex.rightSets||[])] : (ex.sets||[]);
      for(const s of allSets){ volume += (Number(s.weight)||0)*(Number(s.reps)||0); }
    }
  }
  return {count:wos.length, volume, prCount};
}
function biggestGainThisMonth(){
  const now = new Date();
  const exs = allExercises().filter(e=>state.data.workouts.some(w=>{

    return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && w.exercises[e.id];
  }));
  let best = null;
  for(const e of exs){

    if(g!==null && (!best || g>best.gain)) best = {name:e.name, gain:g};
  }
  return best;
}

function renderHeatmap(){
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const daysBack = 83;
  const start = new Date(todayD.getTime() - daysBack*86400000);
  const gridStart = new Date(start.getTime() - start.getDay()*86400000);
  const totalCells = Math.ceil((todayD - gridStart)/86400000) + 1;
  const cols = Math.ceil(totalCells/7);
  const dateSet = workoutDatesSet();
  let cells = '';
  for(let col=0; col<cols; col++){
    for(let row=0; row<7; row++){
      const cellDate = new Date(gridStart.getTime() + (col*7+row)*86400000);
      if(cellDate>todayD){
        cells += `<div class="heat-cell" style="visibility:hidden;"></div>`;
        continue;
      }
      const ds = dateToStr(cellDate);
      const active = dateSet.has(ds);
      cells += `<div class="heat-cell ${active?'active':''}" title="${prettyDate(ds)}${active?' — workout':''}"></div>`;
    }
  }
  return `<div class="heat-grid">${cells}</div>`;
}

/* ---------------- Workout ---------------- */
function freshSets(n){
  return Array.from({length:n}, ()=>({weight:'', reps:''}));
}
function ensureDraft(day){
  const def = state.data.program[day];
  for(const id of def.exerciseIds){
    if(!state.draftSets[id]){
      if(isUnilateralById(id)){
        state.draftSets[id] = { left: freshSets(3), right: freshSets(3) };
      } else {
        state.draftSets[id] = freshSets(3);
      }
    }
  }
}
function buildWorkoutDisplayGroups(day){
  const def = state.data.program[day];
  const supersets = def.supersets || [];
  const seen = new Set();
  const groups = [];
  for(const id of def.exerciseIds){
    if(seen.has(id)) continue;
    const pair = supersets.find(p=>p[0]===id || p[1]===id);
    if(pair && def.exerciseIds.includes(pair[0]) && def.exerciseIds.includes(pair[1])){
      groups.push({type:'superset', ids:pair});
      seen.add(pair[0]); seen.add(pair[1]);
    } else {
      groups.push({type:'single', ids:[id]});
      seen.add(id);
    }
  }
  return groups;
}
function renderWorkout(){
  const day = state.workoutDay;
  ensureDraft(day);
  const def = state.data.program[day];
  const groups = buildWorkoutDisplayGroups(day);
  return `
    <div class="pill-row">
      ${[1,2,3,4].map(d=>`<div class="pill ${d===day?'active':''}" onclick="changeWorkoutDay(${d})">Day ${d}</div>`).join('')}
    </div>

        <button class="btn btn-secondary btn-sm" style="flex-shrink:0;" onclick="repeatLastWorkout()">↺ Repeat Last</button>
      </div>
    </div>
    ${groups.map(g=>{
      if(g.type==='superset'){
        const cards = g.ids.map(id=>renderExerciseCard({id, name:(state.data.exercises[id]||{name:id}).name})).join('');
        return `<div class="superset-wrap"><div class="superset-label">🔗 Superset — alternate sets between these two</div>${cards}</div>`;
      }
      const id = g.ids[0];
      return renderExerciseCard({id, name:(state.data.exercises[id]||{name:id}).name});
    }).join('')}
    <div class="card">
      <div class="card-title">Workout Notes</div>
      <textarea class="notes" id="workoutNotes" placeholder="How did it feel? Court conditions, soreness, focus areas..." oninput="state.draftNotes=this.value">${escapeHtml(state.draftNotes)}</textarea>

}
function repeatLastWorkout(){
  const day = state.workoutDay;
  const past = state.data.workouts.filter(w=>w.day===day).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!past){ showToast('No previous session for this day yet'); return; }
  ensureDraft(day);
  for(const exId in past.exercises){
    if(!state.draftSets[exId]) continue;
    const pastEx = past.exercises[exId];
    const isUni = isUnilateralById(exId);
    if(isUni && pastEx.unilateral){
      state.draftSets[exId].left = (pastEx.leftSets||[]).map(s=>({weight:String(s.weight||''), reps:String(s.reps||'')}));
      state.draftSets[exId].right = (pastEx.rightSets||[]).map(s=>({weight:String(s.weight||''), reps:String(s.reps||'')}));
    } else if(!isUni && !pastEx.unilateral){
      state.draftSets[exId] = (pastEx.sets||[]).map(s=>({weight:String(s.weight||''), reps:String(s.reps||'')}));
    }
  }
  state.draftNotes = past.notes || '';
  showToast('Prefilled from last session');
  render();
}

  const mesoTarget = mesoTargetFor(ex.id);
  const header = `
    <div class="ex-head">
      <div>
        <div class="ex-name">${ex.name}${isUni?' <span class="tag">L/R</span>':''}</div>

        ${sugg ? `<div style="margin-top:6px;"><span class="tag" style="cursor:pointer; border-color:var(--accent); color:var(--accent);" onclick="applySuggestedWeight('${ex.id}', ${sugg})">Suggested ${sugg} lb — tap to apply</span></div>` : ''}
        ${mesoTarget ? `<div style="margin-top:4px;"><span class="tag" style="cursor:pointer; border-color:var(--accent); color:var(--accent);" onclick="applySuggestedWeight('${ex.id}', ${mesoTarget})">Week ${currentMesoWeek()} Target: ${mesoTarget} lb</span></div>` : ''}

          <input class="set-input" type="number" inputmode="numeric" min="0" step="1" placeholder="—" value="${s.reps}" oninput="updateSet('${ex.id}',${i},'reps',this.value)">

          <input class="set-input" type="number" inputmode="numeric" min="0" step="1" placeholder="—" value="${s.reps}" oninput="updateSideSet('${exId}','${side}',${i},'reps',this.value)">

function updateSet(exId, idx, field, val){
  state.draftSets[exId][idx][field] = val;
}
function updateSideSet(exId, side, idx, field, val){
  state.draftSets[exId][side][idx][field] = val;
}
function addSet(exId){
  state.draftSets[exId].push({weight:'',reps:''});
  render();
}
function addSideSet(exId, side){
  state.draftSets[exId][side].push({weight:'',reps:''});
  render();
}
function applySuggestedWeight(exId, weight){
  ensureDraft(state.workoutDay);
  const prev = previousWeightFor(exId);
  if(isUnilateralById(exId)){
    ['left','right'].forEach(side=>{
      const set0 = state.draftSets[exId][side][0];
      set0.weight = String(weight);
      if(!set0.reps && prev) set0.reps = String(prev.reps);
    });
  } else {
    const set0 = state.draftSets[exId][0];
    set0.weight = String(weight);
    if(!set0.reps && prev) set0.reps = String(prev.reps);
  }
  render();
}
function completeWorkout(){
  const day = state.workoutDay;
  const exercisesOut = {};
  let anyLogged = false;
  for(const exId in state.draftSets){
    if(isUnilateralById(exId)){
      const leftSets = (state.draftSets[exId].left||[]).map(s=>({weight:Number(s.weight)||0, reps:Number(s.reps)||0})).filter(s=>s.weight>0||s.reps>0);
      const rightSets = (state.draftSets[exId].right||[]).map(s=>({weight:Number(s.weight)||0, reps:Number(s.reps)||0})).filter(s=>s.weight>0||s.reps>0);
      if(leftSets.length || rightSets.length){
        exercisesOut[exId] = { unilateral:true, leftSets, rightSets };
        anyLogged = true;
      }
    } else {
      const sets = state.draftSets[exId]
        .map(s=>({weight:Number(s.weight)||0, reps:Number(s.reps)||0}))
        .filter(s=>s.weight>0 || s.reps>0);
      if(sets.length){ exercisesOut[exId] = {sets}; anyLogged = true; }
    }
  }
  if(!anyLogged){
    showToast('Log at least one set before completing');
    return;
  }
  snapshot();
  const date = todayStr();
  const prExIds = [];
  const prDetails = [];
  let totalSets = 0, totalVolume = 0;
  for(const exId in exercisesOut){
    const ex = exercisesOut[exId];
    const allSets = ex.unilateral ? [...ex.leftSets, ...ex.rightSets] : ex.sets;
    totalSets += allSets.length;
    for(const s of allSets){ totalVolume += s.weight*s.reps; }
    const priorBest = personalBest(exId);
    const maxThis = allSets.length ? Math.max(...allSets.map(s=>s.weight)) : 0;
    if(!priorBest || maxThis > priorBest.maxWeight){
      prExIds.push(exId);
      const setAtMax = allSets.find(s=>s.weight===maxThis) || allSets[0];
      prDetails.push({ exId, weight:maxThis, reps: setAtMax ? setAtMax.reps : 0 });
    }
  }
  const workout = { id:uid(), date, day, exercises:exercisesOut, notes: state.draftNotes||'', prExIds };
  const existingIdx = state.data.workouts.findIndex(w=>w.date===date && w.day===day);
  if(existingIdx>-1) state.data.workouts[existingIdx] = workout;
  else state.data.workouts.push(workout);

  saveData();
  state.draftSets = {};
  state.draftNotes = '';
  const msg = prExIds.length ? `🏆 Workout saved — ${prExIds.length} new PR${prExIds.length>1?'s':''}!` : '✅ Workout saved';
  showToast(msg, 4500, undoLast);
  state.summaryData = {
    day, date, totalSets, totalVolume,
    exerciseCount: Object.keys(exercisesOut).length,
    prCount: prExIds.length,
    prDetails,
    exercisesSnapshot: exercisesOut,
  };
  state.summaryOpen = true;
  state.cooldownDay = day;
  render();
}

function renderMuscleHeatmap(exercisesSnapshot){
  if(!exercisesSnapshot) return '';
  const totals = {};
  for(const exId in exercisesSnapshot){
    const ex = exercisesSnapshot[exId];
    const allSets = ex.unilateral ? [...(ex.leftSets||[]), ...(ex.rightSets||[])] : (ex.sets||[]);
    let vol = 0;
    for(const s of allSets){ vol += (Number(s.weight)||0) * (Number(s.reps)||0); }
    if(vol<=0) continue;
    const group = EXERCISE_MUSCLE_MAP[exId] || 'Other';
    totals[group] = (totals[group]||0) + vol;
  }
  const groups = Object.keys(totals);
  if(!groups.length) return '';
  const maxVol = Math.max(...groups.map(g=>totals[g]));
  const intensity = g => Math.max(0.12, totals[g]/maxVol);
  const zoneOpacity = g => totals[g] ? intensity(g).toFixed(2) : 0.06;

  return `
    <div class="card">
      <div class="card-title">Muscles Worked</div>
      <svg viewBox="0 0 200 300" class="muscle-map">
        <circle cx="100" cy="26" r="20" fill="var(--bg-card-2)"/>
        <ellipse cx="65" cy="66" rx="22" ry="15" fill="var(--accent)" fill-opacity="${zoneOpacity('Shoulders')}"/>
        <ellipse cx="135" cy="66" rx="22" ry="15" fill="var(--accent)" fill-opacity="${zoneOpacity('Shoulders')}"/>
        <rect x="70" y="60" width="60" height="42" rx="10" fill="var(--accent)" fill-opacity="${zoneOpacity('Chest')}"/>
        <rect x="74" y="104" width="52" height="52" rx="8" fill="var(--accent)" fill-opacity="${zoneOpacity('Core')}"/>
        <ellipse cx="38" cy="95" rx="13" ry="28" fill="var(--accent)" fill-opacity="${zoneOpacity('Biceps')}"/>

function parseStretchSeconds(durationStr){
  const m = durationStr.match(/(\d+)/);
  return m ? parseInt(m[1],10) : 30;
}
function renderCooldown(){
  const day = state.cooldownDay;
  const list = STRETCHES_BY_DAY[day] || [];

  return `

    </div>

      ${list.map((s,i)=>renderStretchRow(s,i)).join('')}
    </div>
    <button class="btn btn-primary btn-block" style="padding:15px; font-size:14px;" onclick="closeCooldown()">Done — Go To Dashboard</button>
    <div style="height:10px;"></div>
  `;
}
function renderStretchRow(s, idx){
  const total = parseStretchSeconds(s.duration);
  const t = state.stretchTimers[idx] || {remaining: total, total, running:false};
  return `
    <div class="list-row" style="align-items:flex-start; flex-wrap:wrap; gap:8px;">
      <div style="flex:1; min-width:180px;">
        <div class="list-row-title">${s.name}</div>
        <div class="list-row-sub" style="margin-top:3px; line-height:1.4;">${s.note}</div>
        <div class="list-row-sub" style="margin-top:2px; opacity:.7;">${s.duration}</div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="mono" id="stretchTimerDisplay-${idx}" style="font-size:18px; min-width:50px; text-align:right;">${formatMMSS(t.remaining)}</div>
        <button class="btn btn-secondary btn-sm" id="stretchTimerBtn-${idx}" onclick="toggleStretchTimer(${idx}, ${total})">${t.running?'Pause':'Start'}</button>
      </div>
    </div>
  `;
}
function toggleStretchTimer(idx, total){
  if(!state.stretchTimers[idx]) state.stretchTimers[idx] = {remaining: total, total, running:false, intervalId:null};
  const t = state.stretchTimers[idx];
  if(t.running){
    clearInterval(t.intervalId);
    t.running = false;
  } else {
    t.running = true;
    t.intervalId = setInterval(()=>{
      t.remaining--;
      updateStretchTimerDisplay(idx);
      if(t.remaining<=0){
        clearInterval(t.intervalId);
        t.running = false;
        t.remaining = 0;
        updateStretchTimerDisplay(idx);
        const btn = document.getElementById('stretchTimerBtn-'+idx);
        if(btn) btn.textContent = 'Start';
        showToast('Stretch complete');
      }
    }, 1000);
  }
  const btn = document.getElementById('stretchTimerBtn-'+idx);
  if(btn) btn.textContent = t.running ? 'Pause' : 'Start';
}
function updateStretchTimerDisplay(idx){
  const el = document.getElementById('stretchTimerDisplay-'+idx);
  if(el) el.textContent = formatMMSS(state.stretchTimers[idx].remaining);
}
function clearAllStretchTimers(){
  for(const idx in state.stretchTimers){
    if(state.stretchTimers[idx].intervalId) clearInterval(state.stretchTimers[idx].intervalId);
  }
  state.stretchTimers = {};
}
function closeCooldown(){
  clearAllStretchTimers();
  state.cooldownOpen = false;
  switchTab('dashboard');
}

function submitQuickAdd(exId){
  const weight = Number(document.getElementById('qaWeight-'+exId).value)||0;
  const reps = Number(document.getElementById('qaReps-'+exId).value)||0;
  if(weight<=0 && reps<=0){ showToast('Enter a weight and reps'); return; }
  const exInfo = exerciseById(exId);
  if(!exInfo){ showToast('Cannot log to an archived exercise'); return; }
  snapshot();
  const day = exInfo.day;
  const date = todayStr();
  const priorBest = personalBest(exId);
  let workout = state.data.workouts.find(w=>w.date===date && w.day===day);
  if(!workout){
    workout = {id:uid(), date, day, exercises:{}, notes:'', prExIds:[]};
    state.data.workouts.push(workout);
  }
  if(!workout.exercises[exId]) workout.exercises[exId] = {sets:[]};
  workout.exercises[exId].sets.push({weight,reps});
  const newMax = Math.max(...workout.exercises[exId].sets.map(s=>s.weight));
  let isPr = false;
  if(!priorBest || newMax>priorBest.maxWeight){
    if(!workout.prExIds.includes(exId)){ workout.prExIds.push(exId); isPr = true; }
  }
  saveData();
  state.quickAddExId = null;
  showToast(isPr?'🏆 New PR logged!':'Logged', 4500, undoLast);
  render();
}
function renderMiniSparkline(values){
  if(values.length<2) return '';
  const w=100,h=24,pad=3;
  const min=Math.min(...values), max=Math.max(...values);
  const range=(max-min)||1;
  const step=(w-pad*2)/(values.length-1);
  const pts=values.map((v,i)=>{
    const x=pad+i*step;
    const y=h-pad-((v-min)/range)*(h-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  return `<svg class="sparkline" width="100%" height="24" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts.join(' ')}" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/></svg>`;
}

/* ---------------- Calendar ---------------- */
function renderCalendar(){
  const y = state.calYear, m = state.calMonth;
  const first = new Date(y,m,1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const monthLabel = first.toLocaleDateString('en-US',{month:'long', year:'numeric'});
  const dows = ['S','M','T','W','T','F','S'];

  const byDate = {};
  for(const w of state.data.workouts){
    (byDate[w.date] = byDate[w.date]||[]).push(w);
  }

  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = dateToStr(new Date(y,m,d));
    const isToday = dateStr===todayStr();
    const wos = byDate[dateStr];
    let cls = 'cal-day';
    if(isToday) cls += ' today';
    if(wos && wos.length) cls += ' done';
    const title = wos ? `Day ${wos.map(w=>w.day).join(', ')} workout` : '';
    cells += `<div class="${cls}" title="${title}" onclick="selectCalDay('${dateStr}')">${d}${(wos&&wos.length)?'<span class="cal-check">✓</span>':''}</div>`;
  }

  const mt = monthlyTotals(y,m);
  const detail = state.calSelected ? renderDayDetail(state.calSelected, byDate) : '';

  return `
    <div class="card">
      <div class="cal-nav">
        <button class="icon-btn" onclick="calShift(-1)">‹</button>
        <div class="cal-month-label">${monthLabel}</div>
        <button class="icon-btn" onclick="calShift(1)">›</button>
      </div>
      <div class="cal-grid">
        ${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
      ${detail}
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${mt.count}</div><div class="stat-label">Workouts This Month</div></div>
      <div class="stat-box"><div class="stat-num">${mt.volume.toLocaleString()}</div><div class="stat-label">Total Volume (lb)</div></div>
    </div>
  `;
}
function calShift(delta){
  let m = state.calMonth + delta, y = state.calYear;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  state.calMonth = m; state.calYear = y; state.calSelected=null;
  render();
}
function selectCalDay(dateStr){
  state.calSelected = state.calSelected===dateStr ? null : dateStr;
  render();
}
function renderDayDetail(dateStr, byDate){
  const wos = byDate[dateStr];
  if(!wos) return `<div class="day-detail">${prettyDate(dateStr)} — no activity logged.</div>`;
  let html = `<div class="day-detail"><strong>${prettyDate(dateStr)}</strong><br>`;
  wos.forEach(w=>{ html += `Day ${w.day} — ${state.data.program[w.day].name}${(w.prExIds&&w.prExIds.length)?' 🏆':''}<br>`; });
  html += `</div>`;
  return html;
}

function renderLineChart(points){
  const w=300, h=140, padL=34, padR=10, padT=14, padB=22;
  const vals = points.map(p=>p.value);
  let min = Math.min(...vals), max = Math.max(...vals);
  if(min===max){ min -= 2; max += 2; }
  const pad = (max-min)*0.1;
  min -= pad; max += pad;
  const stepX = points.length>1 ? (w-padL-padR)/(points.length-1) : 0;
  const xy = points.map((p,i)=>{
    const x = padL + i*stepX;
    const y = padT + (h-padT-padB) - ((p.value-min)/(max-min))*(h-padT-padB);
    return {x,y,p};
  });
  const linePts = xy.map(pt=>`${pt.x.toFixed(1)},${pt.y.toFixed(1)}`).join(' ');
  const areaPts = `${padL},${h-padB} ${linePts} ${xy[xy.length-1].x.toFixed(1)},${h-padB}`;
  const gridLines = [0,0.5,1].map(f=>{
    const y = padT + f*(h-padT-padB);
    const val = (max - f*(max-min)).toFixed(1);
    return `<line x1="${padL}" x2="${w-padR}" y1="${y}" y2="${y}" stroke="var(--line)" stroke-width="1"/>
      <text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="8" fill="var(--text-dim)" font-family="IBM Plex Mono">${val}</text>`;
  }).join('');
  return `
    <svg width="100%" height="150" viewBox="0 0 ${w} ${h+10}" style="margin-top:10px;">
      ${gridLines}
      <polygon points="${areaPts}" fill="var(--accent)" opacity="0.14"/>
      <polyline points="${linePts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${xy.map(pt=>`<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="2.4" fill="var(--accent)"><title>${pt.p.value} — ${prettyDate(pt.p.date)}</title></circle>`).join('')}
      <text x="${padL}" y="${h+9}" font-size="8" fill="var(--text-dim)" font-family="IBM Plex Mono">${prettyDate(points[0].date)}</text>
      <text x="${w-padR}" y="${h+9}" text-anchor="end" font-size="8" fill="var(--text-dim)" font-family="IBM Plex Mono">${prettyDate(points[points.length-1].date)}</text>
    </svg>
  `;
}

function updateDayName(day,val){ if(val.trim()) state.data.program[day].name = val; saveData(); }
function updateDayBlurb(day,val){ state.data.program[day].blurb = val; saveData(); }
function addSuperset(day){
  const aEl = document.getElementById('supersetA-'+day);
  const bEl = document.getElementById('supersetB-'+day);
  const a = aEl.value, b = bEl.value;
  if(a===b){ showToast('Pick two different exercises'); return; }
  const def = state.data.program[day];
  def.supersets = def.supersets || [];
  if(def.supersets.some(p=>p.includes(a)||p.includes(b))){
    showToast('One of those is already paired — remove it first');
    return;
  }
  def.supersets.push([a,b]);
  saveData();
  showToast('Superset paired');
  render();
}
function removeSuperset(day, idx){
  state.data.program[day].supersets.splice(idx,1);
  saveData();
  render();
}
function renameExercise(id,val){ if(val.trim()) state.data.exercises[id].name = val; saveData(); }
function toggleExerciseUnilateral(id, val){
  if(!state.data.exercises[id]) return;
  state.data.exercises[id].unilateral = val;
  saveData();
  delete state.draftSets[id];
  render();
}
function moveExercise(day, id, dir){
  const arr = state.data.program[day].exerciseIds;
  const idx = arr.indexOf(id);
  const newIdx = idx+dir;
  if(newIdx<0 || newIdx>=arr.length) return;
  [arr[idx],arr[newIdx]] = [arr[newIdx],arr[idx]];
  saveData();
  render();
}
function removeExerciseFromDay(day, id){
  snapshot();
  state.data.program[day].exerciseIds = state.data.program[day].exerciseIds.filter(x=>x!==id);
  if(state.data.program[day].supersets){
    state.data.program[day].supersets = state.data.program[day].supersets.filter(p=>!p.includes(id));
  }
  saveData();
  showToast('Exercise removed — history kept', 4500, undoLast);
  render();
}
function addExerciseToDay(day){
  const input = document.getElementById('newExInput-'+day);
  const uniCheckbox = document.getElementById('newExUni-'+day);
  const val = input.value.trim();
  if(!val) return;
  const id = 'ex_'+uid();
  state.data.exercises[id] = {name:val, unilateral: uniCheckbox ? uniCheckbox.checked : false};
  state.data.program[day].exerciseIds.push(id);
  saveData();
  input.value = '';
  render();
}
function moveDay(day, dir){
  const other = day+dir;
  if(other<1||other>4) return;
  const tmp = state.data.program[day];
  state.data.program[day] = state.data.program[other];
  state.data.program[other] = tmp;
  saveData();
  render();
}

/* ---------------- Shareable PR Card ---------------- */
async function ensureFontsLoaded(){
  try{
    await Promise.all([
      document.fonts.load('700 60px Oswald'),
      document.fonts.load('700 34px Oswald'),
      document.fonts.load('700 150px "IBM Plex Mono"'),
      document.fonts.load('500 36px "IBM Plex Mono"'),
      document.fonts.load('600 28px "IBM Plex Sans"'),
    ]);
  }catch(e){ /* fonts may not be ready — canvas will fall back to system font */ }
}
function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight){
  const words = text.split(' ');
  let line = '';
  const lines = [];
  for(const word of words){
    const test = line ? line+' '+word : word;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if(line) lines.push(line);
  lines.forEach((l,i)=> ctx.fillText(l, x, y + i*lineHeight));
  return lines.length;
}
function drawDumbbellMarkCanvas(ctx, x, y, size, color){
  const s = size/24;
  ctx.fillStyle = color;
  function rr(px,py,pw,ph,radius){
    const rx=x+px*s, ry=y+py*s, rw=pw*s, rh=ph*s;
    ctx.beginPath();
    ctx.moveTo(rx+radius, ry);
    ctx.arcTo(rx+rw, ry, rx+rw, ry+rh, radius);
    ctx.arcTo(rx+rw, ry+rh, rx, ry+rh, radius);
    ctx.arcTo(rx, ry+rh, rx, ry, radius);
    ctx.arcTo(rx, ry, rx+rw, ry, radius);
    ctx.closePath();
    ctx.fill();
  }
  rr(1,4,4,16,1.4*s);
  rr(19,4,4,16,1.4*s);
  rr(5,10.2,14,3.6,1.0*s);
}
async function generatePrCardBlob(exName, weight, reps, dateStr, day){
  await ensureFontsLoaded();
  const accent = (getComputedStyle(document.documentElement).getPropertyValue('--lime')||'#ff2d12').trim() || '#ff2d12';
  const W = 1080, H = 1080;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#000000';
  ctx.fillRect(0,0,W,H);

  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 2;
  for(let i=-H; i<W+H; i+=32){
    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i+H,H);
    ctx.stroke();
  }

  ctx.fillStyle = accent;
  ctx.fillRect(0,0,18,H);

  ctx.fillStyle = accent;
  ctx.font = '700 34px Oswald, sans-serif';
  ctx.fillText('PERSONAL RECORD', 80, 130);

  ctx.fillStyle = '#ffffff';
  ctx.font = '700 60px Oswald, sans-serif';
  const nameLines = wrapCanvasText(ctx, exName.toUpperCase(), 80, 220, 920, 68);

  const weightY = 220 + nameLines*68 + 130;
  ctx.fillStyle = accent;
  ctx.font = '700 150px "IBM Plex Mono", monospace';
  ctx.fillText(weight+' LB', 76, weightY);

  ctx.fillStyle = '#9a9a9a';
  ctx.font = '500 36px "IBM Plex Mono", monospace';
  ctx.fillText('× '+reps+' reps', 80, weightY+56);

  ctx.fillStyle = '#8f8f8f';
  ctx.font = '600 28px "IBM Plex Sans", sans-serif';
  ctx.fillText(prettyDate(dateStr).toUpperCase() + '   ·   DAY '+day, 80, H-90);

  drawDumbbellMarkCanvas(ctx, W-160, H-150, 64, accent);

  return await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}
async function sharePrCard(exId, weight, reps, dateStr, day){
  const exName = (state.data.exercises[exId] || {name:exId}).name;
  showToast('Generating PR card…');
  let blob;
  try{
    blob = await generatePrCardBlob(exName, weight, reps, dateStr, day);
  }catch(e){
    showToast('⚠️ Could not generate image');
    return;
  }
  const filename = `pr-${exId}-${dateStr}.png`;
  try{
    if(navigator.canShare && navigator.share){
      const file = new File([blob], filename, {type:'image/png'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'New PR — '+exName});
        return;
      }
    }
  }catch(e){ /* user cancelled or unsupported — fall through to download */ }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('PR card saved');
}

  state.data = defaultData();
  saveData();
  showToast('All data erased', 4500, undoLast);
  render();
}

/* ---------------- Search ---------------- */
function openSearch(){
  state.searchOpen = true;
  state.searchQuery = '';
  render();
  setTimeout(()=>{ const el=document.getElementById('searchInput'); if(el) el.focus(); }, 50);
}
function closeSearch(){
  state.searchOpen = false;
  render();
}
function renderSearch(){
  const q = state.searchQuery.toLowerCase().trim();
  const results = allExercises().filter(e=>e.name.toLowerCase().includes(q));
  return `
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="text-input" id="searchInput" placeholder="Search exercises..." value="${escapeHtml(state.searchQuery)}" oninput="state.searchQuery=this.value; renderSearchResultsOnly();">
    </div>
    <button class="btn btn-secondary" style="margin-bottom:12px;" onclick="closeSearch()">← Back</button>
    <div id="searchResults">${results.map(e=>renderSearchRow(e)).join('') || `<div class="empty-state">No exercises match.</div>`}</div>
  `;
}
function renderSearchRow(e){
  const pb = personalBest(e.id);
  return `<div class="list-row" style="cursor:pointer;" onclick="goToWorkoutDay(${e.day})">
    <div><div class="list-row-title">${e.name}</div><div class="list-row-sub">Day ${e.day} · ${state.data.program[e.day].name}</div></div>
    <div class="list-row-val">${pb?pb.maxWeight+' lb':'—'}</div>
  </div>`;
}
function renderSearchResultsOnly(){
  const q = state.searchQuery.toLowerCase().trim();
  const results = allExercises().filter(e=>e.name.toLowerCase().includes(q));
  document.getElementById('searchResults').innerHTML = results.map(e=>renderSearchRow(e)).join('') || `<div class="empty-state">No exercises match.</div>`;
}

/* ---------------- Rest Timer ---------------- */
function toggleTimer(){
  document.getElementById('timerPanel').classList.toggle('open');
}
function setTimerPreset(sec){
  if(state.timer.running) timerToggle();
  state.timer.seconds = sec;
  state.timer.remaining = sec;
  updateTimerDisplay();
}
function timerToggle(){
  const t = state.timer;
  if(t.running){
    clearInterval(t.intervalId);
    t.running = false;
  } else {
    t.running = true;
    t.intervalId = setInterval(()=>{
      t.remaining--;
      if(t.remaining<=0){
        clearInterval(t.intervalId);
        t.running=false; t.remaining=0;
        updateTimerDisplay();
        showToast('⏱ Rest complete');
        document.getElementById('fab').classList.remove('running');
        document.getElementById('timerStartBtn').textContent='Start';
        return;
      }
      updateTimerDisplay();
    },1000);
  }
  document.getElementById('fab').classList.toggle('running', t.running);
  document.getElementById('timerStartBtn').textContent = t.running ? 'Pause' : 'Start';
}
function timerReset(){
  const t = state.timer;
  clearInterval(t.intervalId);
  t.running=false;
  t.remaining = t.seconds;
  document.getElementById('fab').classList.remove('running');
  document.getElementById('timerStartBtn').textContent='Start';
  updateTimerDisplay();
}
function updateTimerDisplay(){
  const t = state.timer;
  const m = Math.floor(t.remaining/60), s = t.remaining%60;
  const el = document.getElementById('timerDisplay');
  if(el) el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* ---------------- swipe between pages ---------------- */
let _touchStartX=null, _touchStartY=null;
document.getElementById('content').addEventListener('touchstart', function(e){
  _touchStartX = e.touches[0].clientX; _touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('content').addEventListener('touchend', function(e){
  if(_touchStartX===null) return;
  const dx = e.changedTouches[0].clientX - _touchStartX;
  const dy = e.changedTouches[0].clientY - _touchStartY;
  _touchStartX = null;
  const blocked = state.searchOpen || state.editorOpen || state.mesoEditorOpen || state.summaryOpen || state.cooldownOpen;
  if(Math.abs(dx)>60 && Math.abs(dy)<50 && !blocked){
    const curIdx = TAB_ORDER.indexOf(state.tab);
    let newIdx = curIdx + (dx<0 ? 1 : -1);
    newIdx = Math.max(0, Math.min(TAB_ORDER.length-1, newIdx));
    if(newIdx !== curIdx) switchTab(TAB_ORDER[newIdx]);
  }
}, {passive:true});

/* ---------------- helpers ---------------- */
function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------------- boot ---------------- */
async function boot(){
  document.getElementById('content').innerHTML = `<div class="empty-state">Loading your data…</div>`;
  const dateEl = document.getElementById('headerDate');
  if(dateEl) dateEl.textContent = new Date().toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'}).toUpperCase();
  await loadData();
  applyAccentTheme();
  checkProgramRotation();
  updateTimerDisplay();
  if(state.data.settings.autoOpenNextWorkout){
    state.tab = 'workout';
    state.workoutDay = nextWorkoutDay();
  }
  render();
}
boot();

// Register service worker only when this file is actually hosted (http/https),
// never inside Claude's sandboxed artifact iframe.
if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
