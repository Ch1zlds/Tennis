<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stay Hard">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-512.png">
<meta name="theme-color" content="#000000">
<title>Stay Hard — Strength Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink:#000000;
  --ink-2:#0d0d0d;
  --ink-3:#1a1a1a;
  --court:#c81e0f;
  --court-light:#ff4326;
  --chalk:#ffffff;
  --chalk-dim:#8f8f8f;
  --lime:#ff2d12;
  --lime-dim:#a81e0c;
  --clay:#b8291a;
  --line:rgba(255,255,255,0.13);
  --bg:var(--ink);
  --bg-card:var(--ink-2);
  --bg-card-2:var(--ink-3);
  --text:var(--chalk);
  --text-dim:var(--chalk-dim);
  --accent:var(--lime);
  --danger:#ff4d3d;
  --radius:10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
body.light{
  --bg:#ffffff;
  --bg-card:#f4f4f4;
  --bg-card-2:#e9e9e9;
  --text:#0a0a0a;
  --text-dim:#6b6b6b;
  --line:rgba(0,0,0,0.13);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans', -apple-system, sans-serif;
  min-height:100vh;
  overscroll-behavior-y:none;
  transition:background .2s ease,color .2s ease;
}
h1,h2,h3,.display{
  font-family:'Oswald', sans-serif;
  text-transform:uppercase;
  letter-spacing:0.02em;
  margin:0;
}
.mono{font-family:'IBM Plex Mono', monospace;}
#app{max-width:520px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:calc(78px + var(--safe-bottom));}

/* header */
.topbar{
  position:sticky; top:0; z-index:20;
  background:var(--bg);
  padding:calc(14px + var(--safe-top)) 18px 12px;
  border-bottom:2px solid var(--text);
  display:flex; align-items:center; justify-content:space-between;
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:34px;height:34px;border-radius:6px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:'Oswald'; font-weight:700; color:#000; font-size:18px;
  flex-shrink:0;
}
.brand-title{font-size:20px; font-weight:700; letter-spacing:0.03em; font-family:'Oswald'; text-transform:uppercase;}
.brand-sub{font-size:10px; color:var(--text-dim); letter-spacing:0.14em; margin-top:2px; text-transform:uppercase;}
.icon-btn{
  width:38px;height:38px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg-card); color:var(--text); display:flex;align-items:center;justify-content:center;
  font-size:16px; cursor:pointer;
}

/* content */
.content{padding:16px 16px 20px;}
.card{
  background:var(--bg-card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
}
.card-title{font-size:12px; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px; font-weight:700; display:flex; align-items:center; gap:7px;}
.card-title::before{content:''; width:7px; height:7px; background:var(--accent); flex-shrink:0;}

/* quote */
.quote-card{background:#000; border:1px solid var(--line); position:relative; overflow:hidden; padding:18px 16px;}
body.light .quote-card{background:#0a0a0a;}
.quote-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent);}
.quote-text{font-family:'Oswald'; font-size:17px; color:#fff; text-transform:uppercase; letter-spacing:0.01em; line-height:1.35; padding-left:10px; font-weight:600;}
.quote-attr{font-size:10px; color:#8f8f8f; letter-spacing:0.14em; margin-top:10px; padding-left:10px; font-weight:600;}

/* stat grid */
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;}
.stat-box{
  background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px 14px 12px;
}
.stat-num{font-family:'IBM Plex Mono'; font-weight:600; font-size:28px; line-height:1; color:var(--accent);}
.stat-label{font-size:11px; color:var(--text-dim); margin-top:6px; letter-spacing:0.05em; text-transform:uppercase; font-weight:600;}
.streak-hero{
  background:linear-gradient(135deg, var(--court) 0%, var(--ink) 90%);
  border-radius:var(--radius); padding:20px; margin-bottom:12px; position:relative; overflow:hidden;
  border:1px solid var(--line);
}
.streak-hero::after{
  content:'';position:absolute; right:-30px; top:-30px; width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,45,18,0.25), transparent 70%);
}
.streak-num{font-family:'IBM Plex Mono'; font-weight:600; font-size:46px; color:#fff; line-height:1;}
.streak-label{color:#fff; opacity:0.85; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; font-weight:600;}

/* buttons */
.btn{
  border:none; border-radius:8px; padding:13px 16px; font-family:'IBM Plex Sans'; font-weight:700;
  font-size:13px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:6px;
  letter-spacing:0.04em; text-transform:uppercase;
}
.btn-primary{background:var(--accent); color:#fff;}
.btn-secondary{background:var(--bg-card-2); color:var(--text); border:1px solid var(--line);}
.btn-danger{background:transparent; color:var(--danger); border:1px solid rgba(255,77,61,0.4);}
.btn-block{width:100%;}
.btn-sm{padding:8px 12px; font-size:11px; border-radius:7px;}
.pill-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; margin-bottom:14px;}
.pill{
  flex-shrink:0; padding:9px 16px; border-radius:7px; font-size:12.5px; font-weight:700;
  background:var(--bg-card); border:1px solid var(--line); color:var(--text-dim); cursor:pointer;
  font-family:'IBM Plex Sans'; text-transform:uppercase; letter-spacing:0.03em;
}
.pill.active{background:var(--accent); color:#fff; border-color:var(--accent);}

/* exercise card */
.ex-card{background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:10px;}
.ex-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;}
.ex-name{font-size:15px; font-weight:700;}
.ex-prev{font-size:11px; color:var(--text-dim); margin-top:3px;}
.pr-badge{
  background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:3px 8px;
  border-radius:5px; letter-spacing:0.05em; white-space:nowrap; text-transform:uppercase;
}
.set-row{display:grid; grid-template-columns:28px 1fr 1fr; gap:8px; align-items:center; margin-bottom:6px;}
.set-idx{font-family:'IBM Plex Mono'; font-size:12px; color:var(--text-dim); text-align:center;}
.set-input{
  width:100%; background:var(--bg-card-2); border:1px solid var(--line); border-radius:7px;
  padding:9px 10px; color:var(--text); font-family:'IBM Plex Mono'; font-size:14px;
}
.set-input:focus{outline:2px solid var(--accent); outline-offset:-1px;}
.set-input-label{font-size:9px; color:var(--text-dim); text-align:center; margin-bottom:2px; letter-spacing:0.08em; text-transform:uppercase;}

textarea.notes{
  width:100%; min-height:70px; background:var(--bg-card-2); border:1px solid var(--line); border-radius:8px;
  padding:10px; color:var(--text); font-family:'IBM Plex Sans'; font-size:13px; resize:vertical;
}
input.text-input, select.text-input{
  width:100%; background:var(--bg-card-2); border:1px solid var(--line); border-radius:8px;
  padding:11px 12px; color:var(--text); font-family:'IBM Plex Sans'; font-size:14px;
}
label.field-label{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; display:block; margin:10px 0 5px; font-weight:600;}

/* bottom nav */
.tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  max-width:520px; margin:0 auto;
  background:var(--bg-card); border-top:2px solid var(--text);
  display:flex; padding:8px 4px calc(8px + var(--safe-bottom));
}
.tab-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px;
  color:var(--text-dim); background:none; border:none; font-family:'IBM Plex Sans'; cursor:pointer;
}
.tab-item.active{color:var(--accent);}
.tab-icon{font-size:19px; line-height:1;}
.tab-label{font-size:9.5px; letter-spacing:0.04em; text-transform:uppercase; font-weight:700;}

/* calendar */
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
.cal-dow{font-size:9px; text-align:center; color:var(--text-dim); text-transform:uppercase; padding-bottom:4px; letter-spacing:0.05em; font-weight:700;}
.cal-day{
  aspect-ratio:1; border-radius:7px; background:var(--bg-card-2); display:flex; flex-direction:column;
  align-items:center; justify-content:center; font-size:12px; position:relative; cursor:pointer; border:1px solid transparent;
}
.cal-day.empty{background:transparent;}
.cal-day.today{border-color:var(--accent);}
.cal-day.done{background:var(--accent); color:#fff;}
.cal-day.done .cal-check{position:absolute; bottom:3px; font-size:8px;}
.cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.cal-month-label{font-size:16px; font-weight:700; font-family:'Oswald'; text-transform:uppercase;}
.day-detail{margin-top:12px; padding:12px; background:var(--bg-card-2); border-radius:8px; font-size:13px;}

/* toast */
#toast{
  position:fixed; bottom:calc(90px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px);
  background:#000; color:#fff; border:1px solid var(--line); padding:12px 18px; border-radius:8px;
  font-size:13px; z-index:100; opacity:0; pointer-events:none; transition:all .25s ease; max-width:88%; text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
.toast-undo{color:var(--accent); font-weight:700; margin-left:8px; text-transform:uppercase; cursor:pointer; text-decoration:underline;}

/* timer FAB */
.fab{
  position:fixed; right:16px; bottom:calc(94px + var(--safe-bottom)); z-index:40;
  width:52px; height:52px; border-radius:10px; background:var(--bg-card); color:var(--text); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
}
.fab.running{background:var(--accent); color:#fff; border-color:var(--accent);}
.timer-panel{
  position:fixed; right:16px; bottom:calc(154px + var(--safe-bottom)); z-index:40;
  background:var(--bg-card); border:1px solid var(--line); border-radius:10px; padding:14px; width:200px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6); display:none;
}
.timer-panel.open{display:block;}
.timer-display{font-family:'IBM Plex Mono'; font-size:32px; text-align:center; margin-bottom:10px; font-weight:600;}
.timer-presets{display:flex; gap:6px; margin-bottom:10px;}
.timer-presets .pill{padding:6px 0; flex:1; text-align:center; font-size:11px;}
.timer-controls{display:flex; gap:6px;}
.timer-controls .btn{flex:1; padding:9px 4px; font-size:11px;}

/* search */
.search-wrap{position:relative; margin-bottom:14px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:14px;}

.list-row{display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid var(--line);}
.list-row:last-child{border-bottom:none;}
.list-row-title{font-size:14px; font-weight:600;}
.list-row-sub{font-size:11px; color:var(--text-dim); margin-top:2px;}
.list-row-val{font-family:'IBM Plex Mono'; font-weight:600; color:var(--accent); font-size:15px;}
.gain-pos{color:var(--accent);}
.gain-neg{color:#8f8f8f;}

.sparkline{display:block; margin-top:8px;}

.section-gap{height:6px;}
.switch{position:relative; width:46px; height:26px; flex-shrink:0;}
.switch input{opacity:0; width:0; height:0;}
.slider{position:absolute; inset:0; background:var(--bg-card-2); border:1px solid var(--line); border-radius:999px; cursor:pointer; transition:.2s;}
.slider::before{content:''; position:absolute; width:20px; height:20px; left:2px; top:2px; background:var(--chalk-dim); border-radius:50%; transition:.2s;}
.switch input:checked + .slider{background:var(--accent);}
.switch input:checked + .slider::before{transform:translateX(20px); background:#fff;}

.empty-state{text-align:center; padding:30px 10px; color:var(--text-dim); font-size:13px;}
.file-hidden{display:none;}
hr.rule{border:none; border-top:1px solid var(--line); margin:14px 0;}
.badge-row{display:flex; gap:6px; flex-wrap:wrap;}
.tag{font-size:10px; padding:3px 8px; border-radius:5px; background:var(--bg-card-2); color:var(--text-dim); border:1px solid var(--line); text-transform:uppercase; font-weight:600;}
.heat-grid{display:grid; grid-auto-flow:column; grid-template-rows:repeat(7,1fr); gap:3px; overflow-x:auto; padding-bottom:4px;}
.heat-cell{width:10px; height:10px; border-radius:2px; background:var(--bg-card-2);}
.heat-cell.active{background:var(--accent);}
.goal-bar-track{background:var(--bg-card-2); border-radius:999px; height:8px; overflow:hidden;}
.goal-bar-fill{height:100%; background:var(--accent); border-radius:999px;}
.editor-row-btn{width:32px; height:32px; font-size:12px; flex-shrink:0;}
.photo-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:6px;}
.photo-thumb{width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; cursor:pointer; border:1px solid var(--line); display:block;}
.photo-modal{position:fixed; inset:0; background:rgba(0,0,0,0.94); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;}
.photo-modal img{max-width:100%; max-height:70vh; border-radius:8px;}
.photo-modal-controls{display:flex; gap:10px; margin-top:16px;}
::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">!</div>
      <div>
        <div class="brand-title">Stay Hard.</div>
        <div class="brand-sub" id="headerDate"></div>
      </div>
    </div>
    <button class="icon-btn" onclick="openSearch()" aria-label="Search exercises">🔍</button>
  </div>
  <div class="content" id="content"></div>
</div>

<button class="fab" id="fab" onclick="toggleTimer()">⏱</button>
<div class="timer-panel" id="timerPanel">
  <div class="timer-display mono" id="timerDisplay">01:00</div>
  <div class="timer-presets">
    <div class="pill" onclick="setTimerPreset(30)">30s</div>
    <div class="pill" onclick="setTimerPreset(60)">60s</div>
    <div class="pill" onclick="setTimerPreset(90)">90s</div>
  </div>
  <div class="timer-controls">
    <button class="btn btn-primary" id="timerStartBtn" onclick="timerToggle()">Start</button>
    <button class="btn btn-secondary" onclick="timerReset()">Reset</button>
  </div>
</div>

<div class="tabbar" id="tabbar">
  <button class="tab-item" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="tab-icon">🏠</span><span class="tab-label">Home</span></button>
  <button class="tab-item" data-tab="workout" onclick="switchTab('workout')"><span class="tab-icon">🏋️</span><span class="tab-label">Workout</span></button>
  <button class="tab-item" data-tab="progress" onclick="switchTab('progress')"><span class="tab-icon">📈</span><span class="tab-label">Progress</span></button>
  <button class="tab-item" data-tab="calendar" onclick="switchTab('calendar')"><span class="tab-icon">📅</span><span class="tab-label">Calendar</span></button>
  <button class="tab-item" data-tab="more" onclick="switchTab('more')"><span class="tab-icon">⚙️</span><span class="tab-label">More</span></button>
</div>

<div id="toast"></div>
<input type="file" id="importFile" class="file-hidden" accept="application/json">
<input type="file" id="photoInput" class="file-hidden" accept="image/*" capture="environment">

<script>
/* ---------------------------------------------------------------
   STAY HARD — Tennis Dumbbell Strength Tracker
   Vanilla JS, single file, persisted via window.storage (per-user)
   or localStorage when hosted standalone.
--------------------------------------------------------------- */

const STORAGE_KEY = 'stayhard-tennis-tracker-data-v2';

const GOGGINS_QUOTES = [
  "Stay hard.",
  "Don't stop when you're tired. Stop when you're done.",
  "Suffering is the true test of life.",
  "Nobody cares. Work harder.",
  "Discipline is the only way you consistently master yourself.",
  "You have to build calluses on your brain.",
  "Motivation is crap. Motivation comes and goes.",
  "The most important conversations are the ones you have with yourself.",
  "You are stronger than you think.",
  "Take the uncomfortable path.",
  "Callous your mind through pain and suffering.",
  "The only way out is through.",
  "Under great pain is where you find your true self.",
  "Most people quit when they want to. Winners quit when they've had enough.",
  "Every morning you have two choices: keep sleeping or get up and chase your dreams.",
  "Don't feel entitled to anything you didn't sweat for.",
  "When you think you're done, you're only forty percent in.",
  "Adversity is the middle name of the man who wants more.",
];
function quoteForToday(){
  const d = new Date();
  const dayOfYear = Math.floor((d - new Date(d.getFullYear(),0,0))/86400000);
  return GOGGINS_QUOTES[((dayOfYear % GOGGINS_QUOTES.length) + GOGGINS_QUOTES.length) % GOGGINS_QUOTES.length];
}

const DEFAULT_PROGRAM = {
  1: { name:'Push & Serve Power', blurb:'Shoulders, chest, triceps — the drivers behind your serve and overhead.', exerciseIds:['sh_press','inc_press','push_press','lat_raise','front_raise','tri_ext'] },
  2: { name:'Legs & Court Movement', blurb:'Squats, lunges and lateral work for split-step power and court coverage.', exerciseIds:['goblet_squat','walk_lunge','lat_lunge','rdl','step_up','calf_raise'] },
  3: { name:'Pull & Rotational Core', blurb:'Rows and rotation for stroke power and a strong core through impact.', exerciseIds:['bent_row','single_row','rev_fly','woodchop','russian_twist','bicep_curl'] },
  4: { name:'Power & Stability', blurb:'Full-body power and joint stability to move fast and stay injury-free.', exerciseIds:['thruster','sl_rdl','renegade_row','farmers_carry','arnold_press','wrist_curl'] },
};
const DEFAULT_EXERCISES = {
  sh_press:{name:'Dumbbell Shoulder Press'}, inc_press:{name:'Dumbbell Incline Press'},
  push_press:{name:'Dumbbell Push Press (Serve Drive)'}, lat_raise:{name:'Dumbbell Lateral Raise'},
  front_raise:{name:'Dumbbell Front Raise'}, tri_ext:{name:'Dumbbell Overhead Tricep Extension'},
  goblet_squat:{name:'Dumbbell Goblet Squat'}, walk_lunge:{name:'Dumbbell Walking Lunge'},
  lat_lunge:{name:'Dumbbell Lateral Lunge'}, rdl:{name:'Dumbbell Romanian Deadlift'},
  step_up:{name:'Dumbbell Step-Up'}, calf_raise:{name:'Dumbbell Calf Raise'},
  bent_row:{name:'Dumbbell Bent-Over Row'}, single_row:{name:'Dumbbell Single-Arm Row'},
  rev_fly:{name:'Dumbbell Reverse Fly'}, woodchop:{name:'Dumbbell Woodchopper'},
  russian_twist:{name:'Dumbbell Russian Twist'}, bicep_curl:{name:'Dumbbell Bicep Curl'},
  thruster:{name:'Dumbbell Thruster'}, sl_rdl:{name:'Dumbbell Single-Leg RDL'},
  renegade_row:{name:'Dumbbell Renegade Row'}, farmers_carry:{name:"Dumbbell Farmer's Carry"},
  arnold_press:{name:'Dumbbell Arnold Press'}, wrist_curl:{name:'Dumbbell Wrist Curl (Elbow Guard)'},
};
const MEASUREMENT_TYPES = ['Chest','Waist','Arms','Thighs','Hips'];

function allExercises(){
  const out = [];
  for(const day of [1,2,3,4]){
    const def = state.data.program[day];
    for(const id of def.exerciseIds){
      const reg = state.data.exercises[id] || {name:id};
      out.push({id, name:reg.name, day});
    }
  }
  return out;
}
function exerciseById(id){ return allExercises().find(e=>e.id===id); }
function archivedExercises(){
  const activeIds = new Set(allExercises().map(e=>e.id));
  const out = [];
  for(const id in state.data.exercises){
    if(activeIds.has(id)) continue;
    if(exerciseHistory(id).length){
      out.push({id, name:state.data.exercises[id].name, day:null, archived:true});
    }
  }
  return out;
}

function defaultData(){
  return {
    workouts: [],
    bodyweight: [],
    measurements: [],
    photos: [],
    goals: [],
    program: JSON.parse(JSON.stringify(DEFAULT_PROGRAM)),
    exercises: JSON.parse(JSON.stringify(DEFAULT_EXERCISES)),
    settings: { darkMode:true, hapticsEnabled:true, soundEnabled:true, autoOpenNextWorkout:false, lastExportAt:null },
    meta: { createdAt: new Date().toISOString() }
  };
}

let state = {
  data: null,
  tab: 'dashboard',
  workoutDay: 1,
  draftSets: {},
  draftNotes: '',
  searchOpen: false,
  searchQuery: '',
  editorOpen: false,
  expandedIds: new Set(),
  quickAddExId: null,
  measSelectedType: null,
  viewingPhotoId: null,
  backupReminderDismissed: false,
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  calSelected: null,
  timer: { seconds:60, remaining:60, running:false, intervalId:null },
  loaded:false,
};
let lastSnapshot = null;
function snapshot(){ lastSnapshot = JSON.stringify(state.data); }
function undoLast(){
  if(!lastSnapshot) return;
  state.data = JSON.parse(lastSnapshot);
  lastSnapshot = null;
  saveData();
  render();
  showToast('Undone');
}

/* ---------------- storage ---------------- */
const hasClaudeStorage = (typeof window!=='undefined' && !!window.storage);

async function loadData(){
  try{
    let raw = null;
    if(hasClaudeStorage){
      const res = await window.storage.get(STORAGE_KEY, false);
      raw = res ? res.value : null;
    } else {
      raw = localStorage.getItem(STORAGE_KEY);
    }
    if(raw){
      const d = defaultData();
      const parsed = JSON.parse(raw);
      state.data = {
        ...d, ...parsed,
        program: parsed.program || d.program,
        exercises: parsed.exercises || d.exercises,
        goals: parsed.goals || [],
        measurements: parsed.measurements || [],
        photos: parsed.photos || [],
        settings: {...d.settings, ...(parsed.settings||{})}
      };
    } else {
      state.data = defaultData();
    }
  }catch(e){
    state.data = defaultData();
  }
  state.loaded = true;
}
async function saveData(){
  try{
    const json = JSON.stringify(state.data);
    if(hasClaudeStorage){
      await window.storage.set(STORAGE_KEY, json, false);
    } else {
      localStorage.setItem(STORAGE_KEY, json);
    }
  }catch(e){
    showToast('⚠️ Could not save — storage may be full');
  }
}

/* ---------------- utils ---------------- */
function todayStr(){ return dateToStr(new Date()); }
function dateToStr(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function prettyDate(str){
  const d = new Date(str+'T00:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'});
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
let _toastUndoFn = null;
function showToast(msg, ms=2600, undoFn=null){
  const t = document.getElementById('toast');
  _toastUndoFn = undoFn;
  t.innerHTML = escapeHtml(msg) + (undoFn ? ` <span class="toast-undo" onclick="_runToastUndo()">Undo</span>` : '');
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(()=>{ t.classList.remove('show'); _toastUndoFn=null; }, ms);
}
function _runToastUndo(){
  if(_toastUndoFn) _toastUndoFn();
  const t = document.getElementById('toast');
  t.classList.remove('show');
  _toastUndoFn = null;
}
function vibrate(pattern){
  try{ if(state.data.settings.hapticsEnabled!==false && navigator.vibrate) navigator.vibrate(pattern); }catch(e){}
}
let _audioCtx = null;
function playBeep(freq=880, dur=180){
  if(state.data.settings.soundEnabled===false) return;
  try{
    _audioCtx = _audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.16, _audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + dur/1000);
    osc.connect(gain); gain.connect(_audioCtx.destination);
    osc.start();
    osc.stop(_audioCtx.currentTime + dur/1000);
  }catch(e){}
}
function playPrFanfare(){
  playBeep(880,150);
  setTimeout(()=>playBeep(1175,220), 160);
}

/* ---------------- computed stats ---------------- */
function exerciseHistory(exId){
  const rows = [];
  for(const w of state.data.workouts){
    const ex = w.exercises && w.exercises[exId];
    if(!ex || !ex.sets || !ex.sets.length) continue;
    let maxW = 0, repsAtMax = 0, volume = 0;
    for(const s of ex.sets){
      const wt = Number(s.weight)||0, r = Number(s.reps)||0;
      volume += wt*r;
      if(wt>0 && wt >= maxW){ maxW = wt; repsAtMax = r; }
    }
    if(maxW>0) rows.push({date:w.date, maxWeight:maxW, reps:repsAtMax, day:w.day, volume});
  }
  rows.sort((a,b)=> a.date.localeCompare(b.date));
  return rows;
}
function personalBest(exId){
  const h = exerciseHistory(exId);
  if(!h.length) return null;
  return h.reduce((best,cur)=> cur.maxWeight>best.maxWeight ? cur : best, h[0]);
}
function strengthGainPct(exId){
  const h = exerciseHistory(exId);
  if(h.length<2) return null;
  const first = h[0].maxWeight, last = h[h.length-1].maxWeight;
  if(first<=0) return null;
  return ((last-first)/first)*100;
}
function previousWeightFor(exId){
  const h = exerciseHistory(exId);
  if(!h.length) return null;
  return h[h.length-1];
}
function fourWeeksAgoEntry(exId){
  const target = new Date(Date.now() - 28*86400000);
  const h = exerciseHistory(exId);
  let best=null, bestDiff=Infinity;
  for(const r of h){
    const diff = Math.abs(new Date(r.date+'T00:00:00') - target);
    if(diff < bestDiff){ bestDiff = diff; best = r; }
  }
  if(best && bestDiff <= 5*86400000) return best;
  return null;
}
function workoutDatesSet(){
  return new Set(state.data.workouts.map(w=>w.date));
}
function computeStreak(){
  const dates = Array.from(workoutDatesSet()).sort().reverse();
  if(!dates.length) return 0;
  const today = todayStr();
  const yest = dateToStr(new Date(Date.now()-86400000));
  if(dates[0] !== today && dates[0] !== yest) return 0;
  let streak = 1;
  let cursor = new Date(dates[0]+'T00:00:00');
  for(let i=1;i<dates.length;i++){
    const prevDay = dateToStr(new Date(cursor.getTime()-86400000));
    if(dates[i]===prevDay){ streak++; cursor = new Date(dates[i]+'T00:00:00'); }
    else if(dates[i]===dateToStr(cursor)) { continue; }
    else break;
  }
  return streak;
}
function monthlyTotals(year, month){
  const wos = state.data.workouts.filter(w=>{
    const d = new Date(w.date+'T00:00:00');
    return d.getFullYear()===year && d.getMonth()===month;
  });
  let volume = 0;
  for(const w of wos){
    for(const exId in w.exercises){
      for(const s of w.exercises[exId].sets){
        volume += (Number(s.weight)||0) * (Number(s.reps)||0);
      }
    }
  }
  return { count: wos.length, volume };
}
function prsThisMonth(){
  const now = new Date();
  let n = 0;
  for(const w of state.data.workouts){
    const d = new Date(w.date+'T00:00:00');
    if(d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth()){
      n += (w.prExIds||[]).length;
    }
  }
  return n;
}
function nextWorkoutDay(){
  const sorted = [...state.data.workouts].sort((a,b)=> b.date.localeCompare(a.date) || b.day-a.day);
  if(!sorted.length) return 1;
  const last = sorted[0].day;
  return last>=4 ? 1 : last+1;
}

/* ---------------- rendering shell ---------------- */
function applyTheme(){
  document.body.classList.toggle('light', !state.data.settings.darkMode);
}
function switchTab(tab){
  state.tab = tab;
  state.searchOpen = false;
  state.editorOpen = false;
  render();
  window.scrollTo(0,0);
}
function render(){
  applyTheme();
  document.querySelectorAll('.tab-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.tab===state.tab);
  });
  const c = document.getElementById('content');
  if(state.searchOpen){ c.innerHTML = renderSearch(); return; }
  if(state.editorOpen){ c.innerHTML = renderEditor(); return; }
  switch(state.tab){
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'workout': c.innerHTML = renderWorkout(); break;
    case 'progress': c.innerHTML = renderProgress(); break;
    case 'calendar': c.innerHTML = renderCalendar(); break;
    case 'more': c.innerHTML = renderMore(); break;
  }
}

function renderBackupReminder(){
  const last = state.data.settings.lastExportAt;
  const msg = last ? `Last backup ${Math.floor((Date.now()-last)/86400000)} days ago` : `You haven't backed up yet`;
  return `

      <div style="display:flex; gap:8px; margin-top:10px;">

      </div>
    </div>
  `;
}
function shouldShowBackupReminder(){
  if(state.backupReminderDismissed) return false;
  if(state.data.workouts.length < 3) return false;
  const last = state.data.settings.lastExportAt;
  if(!last) return true;
  return (Date.now()-last)/86400000 >= 14;
}
function dismissBackupReminder(){
  state.backupReminderDismissed = true;
  render();
}
function last7DaysStats(){
  const cutoff = dateToStr(new Date(Date.now()-6*86400000));
  const wos = state.data.workouts.filter(w=>w.date>=cutoff);
  let volume=0, prCount=0;
  for(const w of wos){
    prCount += (w.prExIds||[]).length;
    for(const exId in w.exercises){
      for(const s of w.exercises[exId].sets){ volume += (Number(s.weight)||0)*(Number(s.reps)||0); }
    }
  }
  return {count:wos.length, volume, prCount};
}
function biggestGainThisMonth(){
  const now = new Date();
  const exs = allExercises().filter(e=>state.data.workouts.some(w=>{
    const d = new Date(w.date+'T00:00:00');
    return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && w.exercises[e.id];
  }));
  let best = null;
  for(const e of exs){
    const g = strengthGainPct(e.id);
    if(g!==null && (!best || g>best.gain)) best = {name:e.name, gain:g};
  }
  return best;
}
function renderRecapCard(){
  const wk = last7DaysStats();
  const now = new Date();
  const mt = monthlyTotals(now.getFullYear(), now.getMonth());
  const gain = biggestGainThisMonth();
  return `
    <div class="card">
      <div class="card-title">Recap</div>
      <div style="font-size:13.5px; line-height:1.7;">
        This week: <strong>${wk.count}</strong> workout${wk.count===1?'':'s'}, <strong>${wk.volume.toLocaleString()} lb</strong> total volume${wk.prCount?`, <strong>${wk.prCount} PR${wk.prCount>1?'s':''}</strong>`:''}.<br>
        This month: <strong>${mt.count}</strong> workout${mt.count===1?'':'s'}, <strong>${mt.volume.toLocaleString()} lb</strong> lifted.
        ${gain ? `<br>Biggest gain: <strong>${gain.name}</strong> ${gain.gain>=0?'+':''}${gain.gain.toFixed(1)}%.` : ''}
      </div>
    </div>
  `;
}
function renderHeatmap(){
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const daysBack = 83;
  const start = new Date(todayD.getTime() - daysBack*86400000);
  const gridStart = new Date(start.getTime() - start.getDay()*86400000);
  const totalCells = Math.ceil((todayD - gridStart)/86400000) + 1;
  const cols = Math.ceil(totalCells/7);
  const dateSet = workoutDatesSet();
  let cells = '';
  for(let col=0; col<cols; col++){
    for(let row=0; row<7; row++){
      const cellDate = new Date(gridStart.getTime() + (col*7+row)*86400000);
      if(cellDate>todayD){
        cells += `<div class="heat-cell" style="visibility:hidden;"></div>`;
        continue;
      }
      const ds = dateToStr(cellDate);
      const active = dateSet.has(ds);
      cells += `<div class="heat-cell ${active?'active':''}" title="${prettyDate(ds)}${active?' — workout':''}"></div>`;
    }
  }
  return `<div class="heat-grid">${cells}</div>`;
}
function goToWorkoutDay(d){
  state.workoutDay = d;
  state.draftSets = {};
  state.draftNotes = '';
  switchTab('workout');
}

/* ---------------- Workout ---------------- */
function ensureDraft(day){
  const def = state.data.program[day];
  for(const id of def.exerciseIds){
    if(!state.draftSets[id]){
      state.draftSets[id] = [{weight:'',reps:''},{weight:'',reps:''},{weight:'',reps:''}];
    }
  }
}
function renderWorkout(){
  const day = state.workoutDay;
  ensureDraft(day);
  const def = state.data.program[day];
  const exList = def.exerciseIds.map(id=>({id, name:(state.data.exercises[id]||{name:id}).name}));
  return `
    <div class="pill-row">
      ${[1,2,3,4].map(d=>`<div class="pill ${d===day?'active':''}" onclick="changeWorkoutDay(${d})">Day ${d}</div>`).join('')}
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
        <div>
          <h2 style="font-size:20px;">${def.name}</h2>
          <div style="font-size:12.5px; color:var(--text-dim); margin-top:6px; line-height:1.4;">${def.blurb}</div>
        </div>
        <button class="btn btn-secondary btn-sm" style="flex-shrink:0;" onclick="repeatLastWorkout()">↺ Repeat Last</button>
      </div>
    </div>
    ${exList.map(ex=>renderExerciseCard(ex)).join('')}
    <div class="card">
      <div class="card-title">Workout Notes</div>
      <textarea class="notes" id="workoutNotes" placeholder="How did it feel? Court conditions, soreness, focus areas..." oninput="state.draftNotes=this.value">${escapeHtml(state.draftNotes)}</textarea>
    </div>
    <button class="btn btn-primary btn-block" style="padding:15px; font-size:14px;" onclick="completeWorkout()">✅ Complete Workout</button>
    <div style="text-align:center; font-size:10px; color:var(--text-dim); margin-top:10px; letter-spacing:.05em; text-transform:uppercase;">Swipe left / right to switch days</div>
    <div style="height:10px;"></div>
  `;
}
function changeWorkoutDay(d){
  state.workoutDay = d;
  state.draftSets = {};
  state.draftNotes = '';
  render();
}
function repeatLastWorkout(){
  const day = state.workoutDay;
  const past = state.data.workouts.filter(w=>w.day===day).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!past){ showToast('No previous session for this day yet'); return; }
  ensureDraft(day);
  for(const exId in past.exercises){
    if(!state.draftSets[exId]) continue;
    state.draftSets[exId] = past.exercises[exId].sets.map(s=>({weight:String(s.weight||''), reps:String(s.reps||'')}));
  }
  state.draftNotes = past.notes || '';
  showToast('Prefilled from last session');
  render();
}
function renderExerciseCard(ex){
  const prev = previousWeightFor(ex.id);
  const pb = personalBest(ex.id);
  const fw = fourWeeksAgoEntry(ex.id);
  const sets = state.draftSets[ex.id];
  return `
    <div class="ex-card">
      <div class="ex-head">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-prev">${prev ? `Last: ${prev.maxWeight} lb × ${prev.reps} <span style="opacity:.6;">(${prettyDate(prev.date)})</span>` : 'No history yet'}</div>
          ${fw ? `<div class="ex-prev" style="opacity:.7;">4 wks ago: ${fw.maxWeight} lb × ${fw.reps}</div>` : ''}
        </div>
        ${pb ? `<span class="tag">PB ${pb.maxWeight} lb</span>` : ''}
      </div>
      <div class="set-row" style="margin-bottom:2px;">
        <div></div>
        <div class="set-input-label">Weight (lb)</div>
        <div class="set-input-label">Reps</div>
      </div>
      ${sets.map((s,i)=>`
        <div class="set-row">
          <div class="set-idx">${i+1}</div>
          <input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" placeholder="—" value="${s.weight}" oninput="updateSet('${ex.id}',${i},'weight',this.value)">
          <input class="set-input" type="number" inputmode="numeric" min="0" step="1" placeholder="—" value="${s.reps}" oninput="updateSet('${ex.id}',${i},'reps',this.value)">
        </div>
      `).join('')}
      <div style="text-align:right; margin-top:4px;">
        <span class="btn btn-secondary btn-sm" onclick="addSet('${ex.id}')">+ Add Set</span>
      </div>
    </div>
  `;
}
function updateSet(exId, idx, field, val){
  state.draftSets[exId][idx][field] = val;
}
function addSet(exId){
  state.draftSets[exId].push({weight:'',reps:''});
  render();
}
function completeWorkout(){
  const day = state.workoutDay;
  const exercisesOut = {};
  let anyLogged = false;
  for(const exId in state.draftSets){
    const sets = state.draftSets[exId]
      .map(s=>({weight:Number(s.weight)||0, reps:Number(s.reps)||0}))
      .filter(s=>s.weight>0 || s.reps>0);
    if(sets.length){ exercisesOut[exId] = {sets}; anyLogged = true; }
  }
  if(!anyLogged){
    showToast('Log at least one set before completing');
    return;
  }
  snapshot();
  const date = todayStr();
  const prExIds = [];
  for(const exId in exercisesOut){
    const priorBest = personalBest(exId);
    const maxThis = Math.max(...exercisesOut[exId].sets.map(s=>s.weight));
    if(!priorBest || maxThis > priorBest.maxWeight) prExIds.push(exId);
  }
  const workout = { id:uid(), date, day, exercises:exercisesOut, notes: state.draftNotes||'', prExIds };
  const existingIdx = state.data.workouts.findIndex(w=>w.date===date && w.day===day);
  if(existingIdx>-1) state.data.workouts[existingIdx] = workout;
  else state.data.workouts.push(workout);

  saveData();
  state.draftSets = {};
  state.draftNotes = '';
  if(prExIds.length){ vibrate([100,60,100,60,200]); playPrFanfare(); }
  const msg = prExIds.length ? `🏆 Workout saved — ${prExIds.length} new PR${prExIds.length>1?'s':''}!` : '✅ Workout saved';
  showToast(msg, 4500, undoLast);
  switchTab('dashboard');
}

function submitQuickAdd(exId){
  const weight = Number(document.getElementById('qaWeight-'+exId).value)||0;
  const reps = Number(document.getElementById('qaReps-'+exId).value)||0;
  if(weight<=0 && reps<=0){ showToast('Enter a weight and reps'); return; }
  const exInfo = exerciseById(exId);
  if(!exInfo){ showToast('Cannot log to an archived exercise'); return; }
  snapshot();
  const day = exInfo.day;
  const date = todayStr();
  const priorBest = personalBest(exId);
  let workout = state.data.workouts.find(w=>w.date===date && w.day===day);
  if(!workout){
    workout = {id:uid(), date, day, exercises:{}, notes:'', prExIds:[]};
    state.data.workouts.push(workout);
  }
  if(!workout.exercises[exId]) workout.exercises[exId] = {sets:[]};
  workout.exercises[exId].sets.push({weight,reps});
  const newMax = Math.max(...workout.exercises[exId].sets.map(s=>s.weight));
  let isPr = false;
  if(!priorBest || newMax>priorBest.maxWeight){
    if(!workout.prExIds.includes(exId)){ workout.prExIds.push(exId); isPr = true; }
  }
  saveData();
  state.quickAddExId = null;
  if(isPr){ vibrate([100,60,100,60,200]); playPrFanfare(); }
  showToast(isPr?'🏆 New PR logged!':'Logged', 4500, undoLast);
  render();
}
function renderMiniSparkline(values){
  if(values.length<2) return '';
  const w=100,h=24,pad=3;
  const min=Math.min(...values), max=Math.max(...values);
  const range=(max-min)||1;
  const step=(w-pad*2)/(values.length-1);
  const pts=values.map((v,i)=>{
    const x=pad+i*step;
    const y=h-pad-((v-min)/range)*(h-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  return `<svg class="sparkline" width="100%" height="24" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts.join(' ')}" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/></svg>`;
}

/* ---------------- Calendar ---------------- */
function renderCalendar(){
  const y = state.calYear, m = state.calMonth;
  const first = new Date(y,m,1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const monthLabel = first.toLocaleDateString('en-US',{month:'long', year:'numeric'});
  const dows = ['S','M','T','W','T','F','S'];

  const byDate = {};
  for(const w of state.data.workouts){
    (byDate[w.date] = byDate[w.date]||[]).push(w);
  }

  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = dateToStr(new Date(y,m,d));
    const isToday = dateStr===todayStr();
    const wos = byDate[dateStr];
    let cls = 'cal-day';
    if(isToday) cls += ' today';
    if(wos && wos.length) cls += ' done';
    const title = wos ? `Day ${wos.map(w=>w.day).join(', ')} workout` : '';
    cells += `<div class="${cls}" title="${title}" onclick="selectCalDay('${dateStr}')">${d}${(wos&&wos.length)?'<span class="cal-check">✓</span>':''}</div>`;
  }

  const mt = monthlyTotals(y,m);
  const detail = state.calSelected ? renderDayDetail(state.calSelected, byDate) : '';

  return `
    <div class="card">
      <div class="cal-nav">
        <button class="icon-btn" onclick="calShift(-1)">‹</button>
        <div class="cal-month-label">${monthLabel}</div>
        <button class="icon-btn" onclick="calShift(1)">›</button>
      </div>
      <div class="cal-grid">
        ${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
      ${detail}
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${mt.count}</div><div class="stat-label">Workouts This Month</div></div>
      <div class="stat-box"><div class="stat-num">${mt.volume.toLocaleString()}</div><div class="stat-label">Total Volume (lb)</div></div>
    </div>
  `;
}
function calShift(delta){
  let m = state.calMonth + delta, y = state.calYear;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  state.calMonth = m; state.calYear = y; state.calSelected=null;
  render();
}
function selectCalDay(dateStr){
  state.calSelected = state.calSelected===dateStr ? null : dateStr;
  render();
}
function renderDayDetail(dateStr, byDate){
  const wos = byDate[dateStr];
  if(!wos) return `<div class="day-detail">${prettyDate(dateStr)} — no activity logged.</div>`;
  let html = `<div class="day-detail"><strong>${prettyDate(dateStr)}</strong><br>`;
  wos.forEach(w=>{ html += `Day ${w.day} — ${state.data.program[w.day].name}${(w.prExIds&&w.prExIds.length)?' 🏆':''}<br>`; });
  html += `</div>`;
  return html;
}

/* ---- generic line chart (bodyweight + measurements) ---- */
function renderLineChart(points){
  const w=300, h=140, padL=34, padR=10, padT=14, padB=22;
  const vals = points.map(p=>p.value);
  let min = Math.min(...vals), max = Math.max(...vals);
  if(min===max){ min -= 2; max += 2; }
  const pad = (max-min)*0.1;
  min -= pad; max += pad;
  const stepX = points.length>1 ? (w-padL-padR)/(points.length-1) : 0;
  const xy = points.map((p,i)=>{
    const x = padL + i*stepX;
    const y = padT + (h-padT-padB) - ((p.value-min)/(max-min))*(h-padT-padB);
    return {x,y,p};
  });
  const linePts = xy.map(pt=>`${pt.x.toFixed(1)},${pt.y.toFixed(1)}`).join(' ');
  const areaPts = `${padL},${h-padB} ${linePts} ${xy[xy.length-1].x.toFixed(1)},${h-padB}`;
  const gridLines = [0,0.5,1].map(f=>{
    const y = padT + f*(h-padT-padB);
    const val = (max - f*(max-min)).toFixed(1);
    return `<line x1="${padL}" x2="${w-padR}" y1="${y}" y2="${y}" stroke="var(--line)" stroke-width="1"/>
      <text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="8" fill="var(--text-dim)" font-family="IBM Plex Mono">${val}</text>`;
  }).join('');
  return `
    <svg width="100%" height="150" viewBox="0 0 ${w} ${h+10}" style="margin-top:10px;">
      ${gridLines}
      <polygon points="${areaPts}" fill="var(--accent)" opacity="0.14"/>
      <polyline points="${linePts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${xy.map(pt=>`<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="2.4" fill="var(--accent)"><title>${pt.p.value} — ${prettyDate(pt.p.date)}</title></circle>`).join('')}
      <text x="${padL}" y="${h+9}" font-size="8" fill="var(--text-dim)" font-family="IBM Plex Mono">${prettyDate(points[0].date)}</text>
      <text x="${w-padR}" y="${h+9}" text-anchor="end" font-size="8" fill="var(--text-dim)" font-family="IBM Plex Mono">${prettyDate(points[points.length-1].date)}</text>
    </svg>
  `;
}

function handlePhotoSelect(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    const img = new Image();
    img.onload = function(){
      const maxW = 640;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width*scale);
      canvas.height = Math.round(img.height*scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg',0.6);
      snapshot();
      state.data.photos.push({id:uid(), date:todayStr(), dataUrl});
      saveData();
      showToast('Photo added', 4500, undoLast);
      render();
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
  input.value = '';
}

      }).join('')}
      <div style="display:flex; gap:6px; margin-top:6px;">
        <input class="text-input" style="flex:1;" id="newExInput-${day}" placeholder="New exercise name">
        <button class="btn btn-secondary btn-sm" onclick="addExerciseToDay(${day})">+ Add</button>
      </div>
    </div>
  `;
}
function updateDayName(day,val){ if(val.trim()) state.data.program[day].name = val; saveData(); }
function updateDayBlurb(day,val){ state.data.program[day].blurb = val; saveData(); }
function renameExercise(id,val){ if(val.trim()) state.data.exercises[id].name = val; saveData(); }
function moveExercise(day, id, dir){
  const arr = state.data.program[day].exerciseIds;
  const idx = arr.indexOf(id);
  const newIdx = idx+dir;
  if(newIdx<0 || newIdx>=arr.length) return;
  [arr[idx],arr[newIdx]] = [arr[newIdx],arr[idx]];
  saveData();
  render();
}
function removeExerciseFromDay(day, id){
  snapshot();
  state.data.program[day].exerciseIds = state.data.program[day].exerciseIds.filter(x=>x!==id);
  saveData();
  showToast('Exercise removed — history kept', 4500, undoLast);
  render();
}
function addExerciseToDay(day){
  const input = document.getElementById('newExInput-'+day);
  const val = input.value.trim();
  if(!val) return;
  const id = 'ex_'+uid();
  state.data.exercises[id] = {name:val};
  state.data.program[day].exerciseIds.push(id);
  saveData();
  input.value = '';
  render();
}
function moveDay(day, dir){
  const other = day+dir;
  if(other<1||other>4) return;
  const tmp = state.data.program[day];
  state.data.program[day] = state.data.program[other];
  state.data.program[other] = tmp;
  saveData();
  render();
}

/* ---- backup / import / reset ---- */
async function exportBackup(){
  const json = JSON.stringify(state.data, null, 2);
  const filename = `stayhard-backup-${todayStr()}.json`;
  try{
    if(navigator.canShare && navigator.share){
      const file = new File([json], filename, {type:'application/json'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'Stay Hard Backup'});
        state.data.settings.lastExportAt = Date.now();
        saveData();
        render();
        return;
      }
    }
  }catch(e){ /* user cancelled or unsupported — fall through to download */ }
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  state.data.settings.lastExportAt = Date.now();
  saveData();
  showToast('Backup downloaded');
  render();
}
document.getElementById('importFile').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      const parsed = JSON.parse(evt.target.result);
      if(!parsed.workouts) throw new Error('bad format');
      snapshot();
      state.data = {...defaultData(), ...parsed};
      saveData();
      showToast('Backup imported', 4500, undoLast);
      render();
    }catch(err){
      showToast('⚠️ Invalid backup file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});
function resetAllData(){
  if(!confirm('This will permanently erase all workouts, bodyweight, measurements, photos, and goals. Continue?')) return;
  snapshot();
  state.data = defaultData();
  saveData();
  showToast('All data erased', 4500, undoLast);
  render();
}

/* ---------------- Search ---------------- */
function openSearch(){
  state.searchOpen = true;
  state.searchQuery = '';
  render();
  setTimeout(()=>{ const el=document.getElementById('searchInput'); if(el) el.focus(); }, 50);
}
function closeSearch(){
  state.searchOpen = false;
  render();
}
function renderSearch(){
  const q = state.searchQuery.toLowerCase().trim();
  const results = allExercises().filter(e=>e.name.toLowerCase().includes(q));
  return `
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="text-input" id="searchInput" placeholder="Search exercises..." value="${escapeHtml(state.searchQuery)}" oninput="state.searchQuery=this.value; renderSearchResultsOnly();">
    </div>
    <button class="btn btn-secondary" style="margin-bottom:12px;" onclick="closeSearch()">← Back</button>
    <div id="searchResults">${results.map(e=>renderSearchRow(e)).join('') || `<div class="empty-state">No exercises match.</div>`}</div>
  `;
}
function renderSearchRow(e){
  const pb = personalBest(e.id);
  return `<div class="list-row" style="cursor:pointer;" onclick="goToWorkoutDay(${e.day})">
    <div><div class="list-row-title">${e.name}</div><div class="list-row-sub">Day ${e.day} · ${state.data.program[e.day].name}</div></div>
    <div class="list-row-val">${pb?pb.maxWeight+' lb':'—'}</div>
  </div>`;
}
function renderSearchResultsOnly(){
  const q = state.searchQuery.toLowerCase().trim();
  const results = allExercises().filter(e=>e.name.toLowerCase().includes(q));
  document.getElementById('searchResults').innerHTML = results.map(e=>renderSearchRow(e)).join('') || `<div class="empty-state">No exercises match.</div>`;
}

/* ---------------- Rest Timer ---------------- */
function toggleTimer(){
  document.getElementById('timerPanel').classList.toggle('open');
}
function setTimerPreset(sec){
  if(state.timer.running) timerToggle();
  state.timer.seconds = sec;
  state.timer.remaining = sec;
  updateTimerDisplay();
}
function timerToggle(){
  const t = state.timer;
  if(t.running){
    clearInterval(t.intervalId);
    t.running = false;
  } else {
    t.running = true;
    t.intervalId = setInterval(()=>{
      t.remaining--;
      if(t.remaining<=0){
        clearInterval(t.intervalId);
        t.running=false; t.remaining=0;
        updateTimerDisplay();
        vibrate([200,80,200]);
        playBeep(880,220);
        showToast('⏱ Rest complete');
        document.getElementById('fab').classList.remove('running');
        document.getElementById('timerStartBtn').textContent='Start';
        return;
      }
      updateTimerDisplay();
    },1000);
  }
  document.getElementById('fab').classList.toggle('running', t.running);
  document.getElementById('timerStartBtn').textContent = t.running ? 'Pause' : 'Start';
}
function timerReset(){
  const t = state.timer;
  clearInterval(t.intervalId);
  t.running=false;
  t.remaining = t.seconds;
  document.getElementById('fab').classList.remove('running');
  document.getElementById('timerStartBtn').textContent='Start';
  updateTimerDisplay();
}
function updateTimerDisplay(){
  const t = state.timer;
  const m = Math.floor(t.remaining/60), s = t.remaining%60;
  const el = document.getElementById('timerDisplay');
  if(el) el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* ---------------- swipe between workout days ---------------- */
let _touchStartX=null, _touchStartY=null;
document.getElementById('content').addEventListener('touchstart', function(e){
  _touchStartX = e.touches[0].clientX; _touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('content').addEventListener('touchend', function(e){
  if(_touchStartX===null) return;
  const dx = e.changedTouches[0].clientX - _touchStartX;
  const dy = e.changedTouches[0].clientY - _touchStartY;
  _touchStartX = null;
  if(Math.abs(dx)>60 && Math.abs(dy)<50 && state.tab==='workout' && !state.searchOpen && !state.editorOpen){
    let nd = state.workoutDay + (dx<0?1:-1);
    if(nd<1) nd=4; if(nd>4) nd=1;
    changeWorkoutDay(nd);
  }
}, {passive:true});

/* ---------------- helpers ---------------- */
function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------------- boot ---------------- */
async function boot(){
  document.getElementById('content').innerHTML = `<div class="empty-state">Loading your data…</div>`;
  const dateEl = document.getElementById('headerDate');
  if(dateEl) dateEl.textContent = new Date().toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'}).toUpperCase();
  await loadData();
  updateTimerDisplay();
  if(state.data.settings.autoOpenNextWorkout){
    state.tab = 'workout';
    state.workoutDay = nextWorkoutDay();
  }
  render();
}
boot();

// Register service worker only when this file is actually hosted (http/https),
// never inside Claude's sandboxed artifact iframe.
if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
